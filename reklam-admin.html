<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kantin Reklam Admin Paneli</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,0,0,.10), transparent 32%),
        radial-gradient(circle at bottom right, rgba(0,0,0,.08), transparent 28%),
        #f5f5f7;
      color:#111;
      padding:24px;
      min-height:100vh;
    }

    .wrap{
      max-width:1150px;
      margin:auto;
    }

    .top{
      background:linear-gradient(135deg,#050505,#1c1c1e,#000);
      color:#fff;
      border-radius:30px;
      padding:30px;
      margin-bottom:24px;
      box-shadow:0 22px 50px rgba(0,0,0,.25);
      position:relative;
      overflow:hidden;
    }

    .top:before{
      content:"";
      position:absolute;
      width:260px;
      height:260px;
      right:-90px;
      top:-100px;
      background:radial-gradient(circle,rgba(255,255,255,.25),transparent 65%);
    }

    .top h1{
      font-size:32px;
      margin-bottom:8px;
      letter-spacing:-.5px;
      position:relative;
      z-index:2;
    }

    .top p{
      opacity:.75;
      position:relative;
      z-index:2;
    }

    .grid{
      display:grid;
      grid-template-columns:390px 1fr;
      gap:22px;
    }

    .card{
      background:rgba(255,255,255,.88);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,.7);
      border-radius:26px;
      padding:22px;
      box-shadow:0 14px 38px rgba(0,0,0,.09);
    }

    h2{
      font-size:22px;
      margin-bottom:10px;
      letter-spacing:-.3px;
    }

    label{
      display:block;
      font-weight:900;
      margin:14px 0 7px;
      font-size:14px;
    }

    input,textarea,select{
      width:100%;
      padding:14px;
      border-radius:16px;
      border:1px solid #ddd;
      font-size:15px;
      outline:none;
      background:#fafafa;
      transition:.2s;
      font-family:inherit;
    }

    input:focus,
    textarea:focus,
    select:focus{
      border-color:#111;
      background:#fff;
      box-shadow:0 0 0 4px rgba(0,0,0,.06);
    }

    textarea{
      min-height:95px;
      resize:vertical;
    }

    button{
      border:0;
      border-radius:16px;
      padding:13px 16px;
      font-weight:950;
      cursor:pointer;
      font-size:15px;
      transition:.2s;
      font-family:inherit;
    }

    button:active{
      transform:scale(.97);
    }

    .btnMain{
      background:#111;
      color:#fff;
      width:100%;
      margin-top:18px;
      box-shadow:0 12px 24px rgba(0,0,0,.18);
    }

    .btnMain:hover{
      background:#000;
      transform:translateY(-1px);
    }

    .btnDanger{
      background:#ff3b30;
      color:#fff;
    }

    .btnActive{
      background:#34c759;
      color:#fff;
    }

    .btnPassive{
      background:#ff9500;
      color:#fff;
    }

    .list{
      display:grid;
      gap:16px;
    }

    .adItem{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      padding:22px;
      min-height:210px;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.25), transparent 35%),
        linear-gradient(135deg,#050505,#171717,#000);
      color:#fff;
      box-shadow:0 18px 42px rgba(0,0,0,.18);
    }

    .adItem:before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg,transparent,rgba(255,255,255,.12),transparent);
      transform:translateX(-100%);
      animation:shine 4s infinite;
    }

    @keyframes shine{
      0%{transform:translateX(-100%)}
      45%{transform:translateX(100%)}
      100%{transform:translateX(100%)}
    }

    .adContent{
      position:relative;
      z-index:2;
    }

    .status{
      display:inline-block;
      padding:7px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:950;
      margin-bottom:14px;
      letter-spacing:.5px;
    }

    .on{
      background:rgba(52,199,89,.18);
      color:#7dff9f;
      border:1px solid rgba(125,255,159,.35);
    }

    .off{
      background:rgba(255,149,0,.18);
      color:#ffd18a;
      border:1px solid rgba(255,209,138,.35);
    }

    .adBaslik{
      font-size:14px;
      font-weight:900;
      opacity:.72;
      letter-spacing:1.6px;
      text-transform:uppercase;
      margin-bottom:8px;
    }

    .adTitle{
      font-size:42px;
      line-height:.95;
      font-weight:1000;
      letter-spacing:-1.6px;
      margin-bottom:12px;
      background:linear-gradient(90deg,#fff,#d7d7d7,#fff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      text-transform:uppercase;
    }

    .adDesc{
      color:rgba(255,255,255,.78);
      font-size:15px;
      line-height:1.45;
      max-width:620px;
      margin-bottom:14px;
    }

    .adPrice{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:30px;
      font-weight:1000;
      color:#8cffaa;
      text-shadow:0 0 20px rgba(52,199,89,.35);
      margin-bottom:14px;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .empty{
      text-align:center;
      color:#777;
      padding:45px 10px;
      background:#fff;
      border-radius:22px;
      border:1px dashed #ddd;
    }

    .hint{
      font-size:13px;
      color:#666;
      line-height:1.45;
      margin-top:12px;
      background:#f5f5f7;
      border-radius:16px;
      padding:12px;
    }

    @media(max-width:850px){
      body{
        padding:14px;
      }

      .grid{
        grid-template-columns:1fr;
      }

      .top{
        padding:24px;
        border-radius:24px;
      }

      .top h1{
        font-size:24px;
      }

      .adTitle{
        font-size:34px;
      }

      .adItem{
        min-height:190px;
      }
    }
  </style>
</head>

<body>

  <div class="wrap">

    <div class="top">
      <h1>📺 Kantin Reklam Admin Paneli</h1>
      <p>Resimsiz, modern ve dikkat çekici yazı tabanlı reklamlar oluştur.</p>
    </div>

    <div class="grid">

      <div class="card">

        <h2>Yeni Reklam Ekle</h2>

        <label>Üst Başlık</label>
        <input id="baslik" value="KANTİNE YENİ GELDİ">

        <label>Reklam / Ürün Adı</label>
        <input id="urunAdi" placeholder="Örn: Soğuk Kahve">

        <label>Açıklama</label>
        <textarea id="aciklama" placeholder="Örn: Bugün kantinde satışta. Soğuk, taze ve lezzetli."></textarea>

        <label>Fiyat / Kısa Bilgi</label>
        <input id="fiyat" placeholder="Örn: 35 TL">

        <label>Durum</label>
        <select id="aktif">
          <option value="true">Aktif</option>
          <option value="false">Pasif</option>
        </select>

        <button class="btnMain" onclick="reklamEkle()">
          Reklamı Kaydet
        </button>

        <div class="hint">
          Artık resim linki yok. Reklamlar büyük yazı, premium kart ve dikkat çekici tipografi ile gösterilir.
        </div>

      </div>

      <div class="card">

        <h2>Mevcut Reklamlar</h2>

        <div id="liste" class="list">
          <div class="empty">Reklamlar yükleniyor...</div>
        </div>

      </div>

    </div>

  </div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      deleteDoc,
      updateDoc,
      doc,
      serverTimestamp,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
      authDomain: "berber-randevu-14f7f.firebaseapp.com",
      projectId: "berber-randevu-14f7f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const liste = document.getElementById("liste");

    function temizle(text){
      return String(text || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    window.reklamEkle = async function(){

      const baslik =
        document.getElementById("baslik").value.trim()
        || "KANTİNE YENİ GELDİ";

      const urunAdi =
        document.getElementById("urunAdi").value.trim();

      const aciklama =
        document.getElementById("aciklama").value.trim();

      const fiyat =
        document.getElementById("fiyat").value.trim();

      const aktif =
        document.getElementById("aktif").value === "true";

      if(!urunAdi){
        alert("Reklam / ürün adı zorunlu.");
        return;
      }

      await addDoc(collection(db, "reklamlar"), {
        baslik,
        urunAdi,
        aciklama,
        fiyat,
        aktif,
        reklamTipi:"yazi",
        createdAt: serverTimestamp()
      });

      document.getElementById("urunAdi").value = "";
      document.getElementById("aciklama").value = "";
      document.getElementById("fiyat").value = "";
      document.getElementById("aktif").value = "true";

      alert("Reklam eklendi.");

      reklamlariYukle();
    }

    window.durumDegistir = async function(id, mevcutDurum){

      await updateDoc(doc(db, "reklamlar", id), {
        aktif: !mevcutDurum
      });

      reklamlariYukle();
    }

    window.reklamSil = async function(id){

      if(!confirm("Bu reklam silinsin mi?")) return;

      await deleteDoc(doc(db, "reklamlar", id));

      reklamlariYukle();
    }

    async function reklamlariYukle(){

      liste.innerHTML =
        `<div class="empty">Reklamlar yükleniyor...</div>`;

      const q = query(
        collection(db, "reklamlar"),
        orderBy("createdAt", "desc")
      );

      const snap = await getDocs(q);

      if(snap.empty){

        liste.innerHTML =
          `<div class="empty">Henüz reklam eklenmemiş.</div>`;

        return;
      }

      liste.innerHTML = "";

      snap.forEach(d => {

        const r = d.data();
        const id = d.id;

        const baslik = temizle(r.baslik || "KANTİNE YENİ GELDİ");
        const urunAdi = temizle(r.urunAdi || "Reklam adı yok");
        const aciklama = temizle(r.aciklama || "");
        const fiyat = temizle(r.fiyat || "");
        const aktif = r.aktif === true;

        const div = document.createElement("div");
        div.className = "adItem";

        div.innerHTML = `

          <div class="adContent">

            <div class="status ${aktif ? "on" : "off"}">
              ${aktif ? "AKTİF" : "PASİF"}
            </div>

            <div class="adBaslik">
              ${baslik}
            </div>

            <div class="adTitle">
              ${urunAdi}
            </div>

            ${
              aciklama
              ? `<div class="adDesc">${aciklama}</div>`
              : ""
            }

            ${
              fiyat
              ? `<div class="adPrice">₺ ${fiyat.replace("TL","").replace("₺","").trim()}</div>`
              : ""
            }

            <div class="actions">

              <button
                class="${aktif ? "btnPassive" : "btnActive"}"
                onclick="durumDegistir('${id}', ${aktif})"
              >
                ${aktif ? "Pasif Yap" : "Aktif Yap"}
              </button>

              <button
                class="btnDanger"
                onclick="reklamSil('${id}')"
              >
                Sil
              </button>

            </div>

          </div>
        `;

        liste.appendChild(div);

      });

    }

    reklamlariYukle();

  </script>

</body>
</html>
