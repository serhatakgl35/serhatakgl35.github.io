<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Depo Teslim Girişi</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
  background:#f5f5f7;
  color:#111;
}
.header{
  background:#111;
  color:white;
  padding:22px;
  text-align:center;
}
.header h1{margin:0;font-size:22px;font-weight:900}
.header p{margin:6px 0 0;color:#ccc;font-size:13px}

.wrap{
  max-width:1050px;
  margin:20px auto;
  padding:14px;
}
.card{
  background:white;
  border-radius:26px;
  padding:22px;
  box-shadow:0 12px 34px rgba(0,0,0,.08);
  margin-bottom:18px;
}
.form-grid{
  display:grid;
  grid-template-columns:1.3fr 1fr .6fr .8fr;
  gap:12px;
}
label{
  display:block;
  font-size:13px;
  font-weight:900;
  margin-bottom:7px;
  color:#555;
}
select,input,button{
  width:100%;
  padding:15px;
  border-radius:16px;
  border:1px solid #ddd;
  font-size:15px;
  font-weight:800;
}
button{
  border:0;
  background:#111;
  color:white;
  cursor:pointer;
}
.btn-row{
  margin-top:14px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.cancel{
  background:#777;
  display:none;
}
.msg{
  display:none;
  margin-top:14px;
  padding:13px;
  border-radius:15px;
  font-weight:900;
}
.ok{background:#e8f8ee;color:#137333}
.err{background:#fdeaea;color:#b3261e}

table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:13px;
  border-bottom:1px solid #eee;
  text-align:left;
  font-size:14px;
  font-weight:800;
}
th{color:#666;font-size:13px}
.badge{
  display:inline-block;
  padding:7px 11px;
  border-radius:999px;
  background:#f1f1f3;
  font-weight:900;
}
.actions{
  display:flex;
  gap:8px;
}
.small{
  padding:9px 12px;
  border-radius:12px;
  font-size:13px;
}
.edit{background:#2563eb}
.del{background:#dc2626}
.empty{
  text-align:center;
  padding:25px;
  font-weight:900;
  color:#777;
}
@media(max-width:850px){
  .form-grid{grid-template-columns:1fr}
  .btn-row{grid-template-columns:1fr}
  table,thead,tbody,tr,td,th{display:block}
  thead{display:none}
  tr{
    background:white;
    margin-bottom:12px;
    border-radius:18px;
    padding:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.06);
  }
  td{border:0;padding:7px}
  td:before{
    content:attr(data-label) ": ";
    font-weight:900;
    color:#555;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>Depo Teslim Girişi</h1>
  <p>Malzeme teslimatı ekle, yanlış kayıtları düzenle veya sil.</p>
</div>

<div class="wrap">

  <div class="card">
    <div class="form-grid">
      <div>
        <label>Teslim Yeri</label>
        <select id="teslimYeri">
          <option>Karargah Çay Ocağı</option>
          <option>Yemekhane Çay Ocağı</option>
          <option>T1 Kapıaltı</option>
          <option>T2 Kapıaltı</option>
          <option>M Kapıaltı</option>
          <option>Nizamiye</option>
          <option>BDH İcap</option>
        </select>
      </div>

      <div>
        <label>Ürün</label>
        <select id="urun">
          <option>Çay</option>
          <option>Şeker</option>
          <option>Ahşap Karıştırıcı</option>
          <option>Türk Kahvesi</option>
        </select>
      </div>

      <div>
        <label>Miktar</label>
        <input id="miktar" type="number" min="1" placeholder="5">
      </div>

      <div>
        <label>Birim</label>
        <select id="birim">
          <option>kg</option>
          <option>paket</option>
          <option>adet</option>
          <option>koli</option>
          <option>kutu</option>
        </select>
      </div>
    </div>

    <div class="btn-row">
      <button id="saveBtn" onclick="kaydet()">Teslimatı Kaydet</button>
      <button id="cancelBtn" class="cancel" onclick="iptalEt()">Düzenlemeyi İptal Et</button>
    </div>

    <div id="msg" class="msg"></div>
  </div>

  <div class="card">
    <h2>Son Teslimatlar</h2>

    <table>
      <thead>
        <tr>
          <th>Tarih</th>
          <th>Saat</th>
          <th>Teslim Yeri</th>
          <th>Ürün</th>
          <th>Miktar</th>
          <th>İşlem</th>
        </tr>
      </thead>
      <tbody id="liste"></tbody>
    </table>

    <div id="empty" class="empty" style="display:none;">Kayıt bulunamadı.</div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  updateDoc,
  deleteDoc,
  doc,
  query,
  orderBy,
  limit,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
  authDomain: "berber-randevu-14f7f.firebaseapp.com",
  projectId: "berber-randevu-14f7f",
  storageBucket: "berber-randevu-14f7f.firebasestorage.app",
  messagingSenderId: "280530860977",
  appId: "1:280530860977:web:52c0df04c228896f211b90",
  measurementId: "G-NK6DBBQQNZ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let kayitlar = [];
let duzenlenenId = null;

function tarihSaatAl(){
  const now = new Date();
  return {
    tarih: now.toISOString().slice(0,10),
    saat: now.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"})
  };
}

function mesaj(text,type){
  const el = document.getElementById("msg");
  el.textContent = text;
  el.className = "msg " + type;
  el.style.display = "block";
  setTimeout(()=>el.style.display="none",2500);
}

function temiz(v){
  return String(v || "-")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

window.kaydet = async function(){
  const teslimYeri = document.getElementById("teslimYeri").value;
  const urun = document.getElementById("urun").value;
  const miktar = Number(document.getElementById("miktar").value);
  const birim = document.getElementById("birim").value;

  if(!miktar || miktar <= 0){
    mesaj("Geçerli miktar girin.", "err");
    return;
  }

  try{
    if(duzenlenenId){
      await updateDoc(doc(db,"depo_teslimatlar",duzenlenenId), {
        teslimYeri,
        urun,
        miktar,
        birim,
        duzenlemeZamani: serverTimestamp()
      });

      mesaj("Kayıt güncellendi.", "ok");
      iptalEt();
    }else{
      const { tarih, saat } = tarihSaatAl();

      await addDoc(collection(db,"depo_teslimatlar"), {
        teslimYeri,
        urun,
        miktar,
        birim,
        tarih,
        saat,
        kayitZamani: serverTimestamp()
      });

      mesaj("Teslimat kaydedildi.", "ok");
      document.getElementById("miktar").value = "";
    }

    yukle();

  }catch(e){
    console.error(e);
    mesaj("İşlem sırasında hata oluştu.", "err");
  }
};

window.duzenle = function(id){
  const x = kayitlar.find(k => k.id === id);
  if(!x) return;

  duzenlenenId = id;

  document.getElementById("teslimYeri").value = x.teslimYeri;
  document.getElementById("urun").value = x.urun;
  document.getElementById("miktar").value = x.miktar;
  document.getElementById("birim").value = x.birim;

  document.getElementById("saveBtn").textContent = "Değişiklikleri Kaydet";
  document.getElementById("cancelBtn").style.display = "block";

  window.scrollTo({top:0,behavior:"smooth"});
};

window.iptalEt = function(){
  duzenlenenId = null;
  document.getElementById("saveBtn").textContent = "Teslimatı Kaydet";
  document.getElementById("cancelBtn").style.display = "none";
  document.getElementById("miktar").value = "";
};

window.sil = async function(id){
  if(!confirm("Bu teslimat kaydı silinsin mi?")) return;

  try{
    await deleteDoc(doc(db,"depo_teslimatlar",id));
    mesaj("Kayıt silindi.", "ok");
    yukle();
  }catch(e){
    console.error(e);
    mesaj("Silme işlemi başarısız.", "err");
  }
};

async function yukle(){
  const snap = await getDocs(
    query(
      collection(db,"depo_teslimatlar"),
      orderBy("kayitZamani","desc"),
      limit(100)
    )
  );

  kayitlar = snap.docs.map(d => ({
    id:d.id,
    ...d.data()
  }));

  tabloYaz();
}

function tabloYaz(){
  const tbody = document.getElementById("liste");
  const empty = document.getElementById("empty");
  tbody.innerHTML = "";

  if(kayitlar.length === 0){
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";

  kayitlar.forEach(x => {
    tbody.innerHTML += `
      <tr>
        <td data-label="Tarih">${temiz(x.tarih)}</td>
        <td data-label="Saat">${temiz(x.saat)}</td>
        <td data-label="Teslim Yeri"><span class="badge">${temiz(x.teslimYeri)}</span></td>
        <td data-label="Ürün"><span class="badge">${temiz(x.urun)}</span></td>
        <td data-label="Miktar">${temiz(x.miktar)} ${temiz(x.birim)}</td>
        <td data-label="İşlem">
          <div class="actions">
            <button class="small edit" onclick="duzenle('${x.id}')">Düzenle</button>
            <button class="small del" onclick="sil('${x.id}')">Sil</button>
          </div>
        </td>
      </tr>
    `;
  });
}

yukle();
</script>

</body>
</html>
