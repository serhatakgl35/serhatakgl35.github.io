<!-- depo-teslim.html -->
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Depo Teslim Girişi</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;background:#f5f5f7;color:#111}
    header{background:#111;color:white;padding:18px;text-align:center;font-weight:800;font-size:20px}
    .wrap{max-width:720px;margin:22px auto;padding:16px}
    .card{background:white;border-radius:24px;padding:22px;box-shadow:0 12px 30px rgba(0,0,0,.08)}
    label{display:block;font-weight:700;margin:14px 0 7px}
    select,input,textarea,button{width:100%;padding:15px;border-radius:16px;border:1px solid #ddd;font-size:16px}
    textarea{resize:none;height:90px}
    button{margin-top:18px;background:#111;color:white;border:0;font-weight:800;cursor:pointer}
    button:active{transform:scale(.98)}
    .msg{margin-top:14px;padding:13px;border-radius:14px;display:none;font-weight:700}
    .ok{background:#e8f8ee;color:#137333}
    .err{background:#fdeaea;color:#b3261e}
    .nav{margin-top:14px;text-align:center}
    .nav a{color:#111;font-weight:800;text-decoration:none}
  </style>
</head>
<body>

<header>Depo Teslim Girişi</header>

<div class="wrap">
  <div class="card">
    <label>Teslim Yeri</label>
    <select id="teslimYeri">
      <option>Karargah Çay Ocağı</option>
      <option>Yemekhane Çay Ocağı</option>
      <option>T1 Kapıaltı</option>
      <option>T2 Kapıaltı</option>
      <option>M Kapıaltı</option>
      <option>Nizamiye</option>
      <option>BDH İcap</option>
    </select>

    <label>Ürün</label>
    <select id="urun">
      <option>Çay</option>
      <option>Şeker</option>
      <option>Ahşap Karıştırıcı</option>
      <option>Türk Kahvesi</option>
    </select>

    <label>Miktar</label>
    <input id="miktar" type="number" min="1" placeholder="Örn: 5" />

    <label>Birim</label>
    <select id="birim">
      <option>kg</option>
      <option>paket</option>
      <option>adet</option>
      <option>koli</option>
      <option>kutu</option>
    </select>

    <label>Teslim Eden</label>
    <input id="teslimEden" placeholder="Örn: Depo Görevlisi" />

    <label>Açıklama</label>
    <textarea id="aciklama" placeholder="İsteğe bağlı"></textarea>

    <button onclick="kaydet()">Teslimatı Kaydet</button>

    <div id="msg" class="msg"></div>

    <div class="nav">
      <a href="depo-teslim-listesi.html">Teslimat Listesini Görüntüle →</a>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
  authDomain: "berber-randevu-14f7f.firebaseapp.com",
  projectId: "berber-randevu-14f7f",
  storageBucket: "berber-randevu-14f7f.firebasestorage.app",
  messagingSenderId: "280530860977",
  appId: "1:280530860977:web:52c0df04c228896f211b90",
  measurementId: "G-NK6DBBQQNZ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function tarihSaatAl(){
    const now = new Date();
    const tarih = now.toISOString().slice(0,10);
    const saat = now.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
    return { tarih, saat };
  }

  function mesaj(text,type){
    const el = document.getElementById("msg");
    el.textContent = text;
    el.className = "msg " + type;
    el.style.display = "block";
  }

  window.kaydet = async function(){
    const teslimYeri = document.getElementById("teslimYeri").value;
    const urun = document.getElementById("urun").value;
    const miktar = Number(document.getElementById("miktar").value);
    const birim = document.getElementById("birim").value;
    const teslimEden = document.getElementById("teslimEden").value.trim() || "Depo Görevlisi";
    const aciklama = document.getElementById("aciklama").value.trim();

    if(!miktar || miktar <= 0){
      mesaj("Lütfen geçerli bir miktar girin.", "err");
      return;
    }

    const { tarih, saat } = tarihSaatAl();

    try{
      await addDoc(collection(db, "depo_teslimatlar"), {
        teslimYeri,
        urun,
        miktar,
        birim,
        teslimEden,
        aciklama,
        tarih,
        saat,
        kayitZamani: serverTimestamp()
      });

      mesaj("Teslimat başarıyla kaydedildi.", "ok");
      document.getElementById("miktar").value = "";
      document.getElementById("aciklama").value = "";
    }catch(e){
      console.error(e);
      mesaj("Kayıt sırasında hata oluştu.", "err");
    }
  };
</script>

</body>
</html>
