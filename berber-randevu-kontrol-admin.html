<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berber Randevu Kontrolü</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,#fff,transparent 30%),#f5f5f7;color:#111;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;}
.wrap{width:min(920px,100%);margin:0 auto;padding:28px 16px 46px}
.top{display:flex;justify-content:space-between;align-items:center;gap:12px;background:#111;color:#fff;border-radius:26px;padding:14px 16px;margin-bottom:18px;box-shadow:0 18px 48px rgba(0,0,0,.16)}
.top h1{font-size:20px;margin:0;font-weight:1000;letter-spacing:-.4px}
.top a{background:#fff;color:#111;text-decoration:none;border-radius:999px;padding:10px 14px;font-weight:950}
.card{background:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.75);border-radius:32px;padding:26px;box-shadow:0 22px 64px rgba(0,0,0,.10);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.card h2{margin:0 0 8px;font-size:32px;letter-spacing:-.8px}.card p{margin:0 0 20px;color:#6b7280;font-weight:750;line-height:1.45}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{display:flex;flex-direction:column;gap:7px}.full{grid-column:1/-1}label{font-size:14px;font-weight:950}
input,select,textarea{width:100%;border:1px solid rgba(0,0,0,.12);background:#f3f4f6;color:#111;border-radius:18px;padding:14px 15px;font-size:15px;font-family:inherit;outline:none}
textarea{min-height:110px;resize:vertical;line-height:1.45}input:focus,select:focus,textarea:focus{background:#fff;border-color:rgba(0,0,0,.28);box-shadow:0 0 0 5px rgba(17,17,17,.06)}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}button{border:0;border-radius:18px;padding:15px 18px;background:#111;color:#fff;font-weight:1000;font-size:15px;cursor:pointer;font-family:inherit}button.secondary{background:#fff;color:#111;border:1px solid rgba(0,0,0,.10)}
.status{margin-top:16px;border-radius:18px;padding:14px 16px;background:#f8fafc;border:1px solid rgba(0,0,0,.08);color:#4b5563;font-weight:800;white-space:pre-wrap}
.preview{margin-top:18px;background:#111827;color:white;border-radius:26px;padding:22px;display:none}.preview.show{display:block}.preview .badge{display:inline-flex;border-radius:999px;padding:8px 12px;background:#f59e0b;font-weight:950;font-size:12px;margin-bottom:14px}.preview h3{margin:0 0 10px;font-size:26px}.preview p{color:rgba(255,255,255,.86);margin:0;line-height:1.5}
@media(max-width:720px){.grid{grid-template-columns:1fr}.card{padding:20px;border-radius:26px}.card h2{font-size:26px}.top{align-items:flex-start;flex-direction:column}.top a{width:100%;text-align:center}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><h1>Berber Randevu Kontrolü</h1><a href="panel.html">Personel Paneline Dön</a></div>
  <section class="card">
    <h2>Randevu sayfasını admin panelden yönet</h2>
    <p>Buradan kaydedilen ayar hem personel panelindeki Berber Randevusu kartını hem de randevu.html sayfasına doğrudan erişimi kontrol eder.</p>
    <div class="grid">
      <div class="field"><label for="aktif">Genel Durum</label><select id="aktif"><option value="true">Aktif</option><option value="false">Geçici Kapalı</option></select></div>
      <div class="field"><label for="sayacGoster">Sayaç</label><select id="sayacGoster"><option value="true">Göster</option><option value="false">Gizle</option></select></div>
      <div class="field"><label for="kapatmaBaslangic">Kapatma Başlangıcı</label><input id="kapatmaBaslangic" type="datetime-local"></div>
      <div class="field"><label for="tekrarAktifTarih">Tekrar Aktif Olacağı Tarih</label><input id="tekrarAktifTarih" type="datetime-local"></div>
      <div class="field full"><label for="baslik">Başlık</label><input id="baslik" type="text" value="Berber Randevusu"></div>
      <div class="field full"><label for="aciklama">Açıklama</label><textarea id="aciklama">Berber personelin yıllık izne ayrılması sebebiyle randevu alınamamaktadır.</textarea></div>
    </div>
    <div class="actions"><button id="kaydetBtn" type="button">Ayarları Kaydet</button><button id="aktifYapBtn" class="secondary" type="button">Hemen Aktif Yap</button><button id="ornekBtn" class="secondary" type="button">25 Haziran - 15 Temmuz Örneğini Doldur</button></div>
    <div id="status" class="status">Ayarlar yükleniyor...</div>
    <div id="preview" class="preview"><div class="badge">GEÇİCİ KAPALI</div><h3 id="previewBaslik">Berber Randevusu</h3><p id="previewMesaj"></p></div>
  </section>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const firebaseConfig = {apiKey:"AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",authDomain:"berber-randevu-14f7f.firebaseapp.com",projectId:"berber-randevu-14f7f",storageBucket:"berber-randevu-14f7f.firebasestorage.app",messagingSenderId:"280530860977",appId:"1:280530860977:web:52c0df04c228896f211b90"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const AYAR_REF = doc(db, "site_ayarlar", "berber_randevu");
const aktif = document.getElementById("aktif");
const sayacGoster = document.getElementById("sayacGoster");
const kapatmaBaslangic = document.getElementById("kapatmaBaslangic");
const tekrarAktifTarih = document.getElementById("tekrarAktifTarih");
const baslik = document.getElementById("baslik");
const aciklama = document.getElementById("aciklama");
const statusEl = document.getElementById("status");
const preview = document.getElementById("preview");
const previewBaslik = document.getElementById("previewBaslik");
const previewMesaj = document.getElementById("previewMesaj");
const VARSAYILAN = {aktif:true,kapatmaBaslangic:"2026-06-25T00:00",tekrarAktifTarih:"2026-07-15T00:00",baslik:"Berber Randevusu",aciklama:"Berber personelin yıllık izne ayrılması sebebiyle randevu alınamamaktadır.",sayacGoster:true};
function temiz(v){return String(v || "").trim();}
function escapeHtml(v){return String(v || "").replace(/[&<>'"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"})[ch]);}
function tarihMetni(v){if(!v) return "belirlenen tarihte"; const m = String(v).match(/^(\d{4})-(\d{2})-(\d{2})/); if(!m) return "belirlenen tarihte"; const d = new Date(Number(m[1]), Number(m[2])-1, Number(m[3])); return d.toLocaleDateString("tr-TR", {day:"numeric", month:"long", year:"numeric"});}
function formuDoldur(d){aktif.value = d.aktif === false ? "false" : "true"; sayacGoster.value = d.sayacGoster === false ? "false" : "true"; kapatmaBaslangic.value = temiz(d.kapatmaBaslangic || "2026-06-25T00:00").slice(0,16); tekrarAktifTarih.value = temiz(d.tekrarAktifTarih || "2026-07-15T00:00").slice(0,16); baslik.value = temiz(d.baslik || VARSAYILAN.baslik); aciklama.value = temiz(d.aciklama || VARSAYILAN.aciklama); onizlemeGuncelle();}
function formVerisi(){return {aktif: aktif.value === "true",kapatmaBaslangic: kapatmaBaslangic.value,tekrarAktifTarih: tekrarAktifTarih.value,baslik: temiz(baslik.value) || "Berber Randevusu",aciklama: temiz(aciklama.value) || "Berber randevu sistemi geçici olarak kapalıdır.",sayacGoster: sayacGoster.value === "true",guncellemeTarihi: serverTimestamp()};}
function onizlemeGuncelle(){const d = formVerisi(); preview.classList.add("show"); previewBaslik.textContent = d.baslik; previewMesaj.innerHTML = escapeHtml(d.aciklama).replace(/\n/g,"<br>") + "<br><br>Platform <b>" + escapeHtml(tarihMetni(d.tekrarAktifTarih)) + "</b> tarihinde tekrar aktif olacaktır.";}
[aktif,sayacGoster,kapatmaBaslangic,tekrarAktifTarih,baslik,aciklama].forEach(el=>el.addEventListener("input", onizlemeGuncelle));
document.getElementById("ornekBtn").addEventListener("click", function(){formuDoldur(VARSAYILAN); statusEl.textContent = "Örnek tarih aralığı dolduruldu. Kaydet butonuna basarsanız 25 Haziran - 15 Temmuz arası otomatik kapanır.";});
document.getElementById("aktifYapBtn").addEventListener("click", async function(){aktif.value = "true"; const d = formVerisi(); d.kapatmaBaslangic = ""; d.tekrarAktifTarih = ""; try{await setDoc(AYAR_REF, d, {merge:true}); statusEl.textContent = "Berber randevu sistemi hemen aktif yapıldı."; formuDoldur(d);}catch(e){console.error(e); statusEl.textContent = "Kaydedilemedi. İnternet bağlantısını ve Firestore yetkilerini kontrol edin.";}});
document.getElementById("kaydetBtn").addEventListener("click", async function(){const d = formVerisi(); if(!d.tekrarAktifTarih && d.aktif === false){statusEl.textContent = "Geçici kapalı yaparken tekrar aktif olacağı tarihi girmen daha güvenli olur."; return;} try{await setDoc(AYAR_REF, d, {merge:true}); statusEl.textContent = "Ayarlar kaydedildi. Personel paneli ve randevu.html bu ayara göre çalışacak.";}catch(e){console.error(e); statusEl.textContent = "Kaydedilemedi. İnternet bağlantısını ve Firestore yetkilerini kontrol edin.";}});
async function yukle(){try{const snap = await getDoc(AYAR_REF); const d = snap.exists() ? {...VARSAYILAN, ...(snap.data() || {})} : VARSAYILAN; formuDoldur(d); statusEl.textContent = snap.exists() ? "Mevcut ayarlar yüklendi." : "Kayıt bulunamadı. Varsayılan izin tarihleri dolduruldu; kullanmak için Kaydet'e bas.";}catch(e){console.error(e); formuDoldur(VARSAYILAN); statusEl.textContent = "Ayarlar okunamadı. Varsayılan değerler gösteriliyor.";}}
yukle();
</script>
</body>
</html>
