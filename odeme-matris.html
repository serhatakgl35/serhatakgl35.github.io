<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ödeme Matris Paneli</title>

<style>
*{box-sizing:border-box}

:root{
  --bg:#f5f5f7;
  --text:#111;
  --muted:#6b7280;
  --line:#e5e7eb;
  --shadow:0 14px 40px rgba(0,0,0,.08);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
}

.topbar{
  position:sticky;
  top:0;
  z-index:50;
  background:rgba(17,17,17,.94);
  backdrop-filter:blur(16px);
  padding:13px 16px;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.topbar a,
.topbar button{
  background:#fff;
  color:#111;
  border:0;
  border-radius:999px;
  padding:10px 15px;
  font-weight:900;
  text-decoration:none;
  cursor:pointer;
}

.wrap{
  width:min(1500px,100%);
  margin:24px auto;
  padding:0 14px 40px;
}

.card{
  background:#fff;
  border:1px solid rgba(0,0,0,.06);
  border-radius:24px;
  padding:20px;
  box-shadow:var(--shadow);
  margin-bottom:16px;
}

h1{
  margin:0 0 8px;
  font-size:34px;
  font-weight:1000;
  letter-spacing:-.7px;
}

p{
  color:var(--muted);
  line-height:1.45;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  align-items:end;
}

label{
  display:block;
  font-size:13px;
  font-weight:900;
  margin-bottom:6px;
}

input,select{
  width:100%;
  border:1px solid var(--line);
  border-radius:15px;
  padding:12px 13px;
  font:inherit;
  outline:none;
  background:#f8fafc;
}

button.main{
  width:100%;
  border:0;
  border-radius:16px;
  padding:13px 15px;
  background:#111;
  color:#fff;
  font-weight:950;
  cursor:pointer;
}

button.green{
  background:#15803d;
}

button.blue{
  background:#2563eb;
}

.summary{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:12px;
}

.sumBox{
  background:#f8fafc;
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
}

.sumBox b{
  display:block;
  font-size:24px;
  margin-top:5px;
}

.tableWrap{
  overflow:auto;
  border:1px solid var(--line);
  border-radius:22px;
  background:#fff;
  max-height:72vh;
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  min-width:900px;
}

th,td{
  border-bottom:1px solid #eee;
  border-right:1px solid #eee;
  padding:10px;
  font-size:13px;
  text-align:center;
  vertical-align:middle;
  white-space:nowrap;
}

th{
  position:sticky;
  top:0;
  z-index:5;
  background:#111;
  color:white;
  font-weight:950;
}

th:first-child{
  left:0;
  z-index:7;
}

td:first-child{
  position:sticky;
  left:0;
  z-index:3;
  background:#fff;
  text-align:left;
  font-weight:950;
  min-width:230px;
  max-width:260px;
  white-space:normal;
}

tr:nth-child(even) td:first-child{
  background:#eaf3ff;
}

.personelSub{
  display:block;
  font-size:12px;
  color:#444;
  font-weight:800;
  margin-top:4px;
}

.cell{
  display:block;
  border-radius:12px;
  padding:8px 9px;
  font-weight:950;
  min-width:80px;
}

.odendi{
  background:#dcfce7;
  color:#166534;
}

.bekliyor{
  background:#fef3c7;
  color:#92400e;
}

.reddedildi{
  background:#fee2e2;
  color:#991b1b;
}

.fazla{
  background:#dbeafe;
  color:#1d4ed8;
}

.bos{
  background:#f3f4f6;
  color:#6b7280;
}

.genelBorc{
  background:#fee2e2;
  color:#991b1b;
}

.genelFazla{
  background:#dbeafe;
  color:#1d4ed8;
}

.genelTamam{
  background:#dcfce7;
  color:#166534;
}

.small{
  display:block;
  font-size:11px;
  opacity:.85;
  margin-top:3px;
}

.loading{
  padding:30px;
  text-align:center;
  color:var(--muted);
  font-weight:900;
}

.msg{
  margin-top:10px;
  font-weight:900;
  color:#166534;
}

@media(max-width:760px){
  h1{font-size:27px}
  .card{padding:15px;border-radius:20px}
  .topbar a,.topbar button{font-size:12px;padding:8px 11px}
  th,td{font-size:12px;padding:8px}
  td:first-child{min-width:190px}
}
</style>
</head>

<body>

<div class="topbar">
  <a href="adminpanel.html">Yönetim Merkezi</a>
  <a href="odeme-admin.html">Ödeme Admin</a>
  <a href="index.html">Personel Giriş</a>
  <button onclick="cikisYap()">Çıkış</button>
</div>

<div class="wrap">

  <div class="card">
    <h1>Çay Ocağı Ödeme Matrisi</h1>
    <p>
      Tüm personelleri ve seçtiğin dönemleri tek tabloda gösterir.
      Personeller bir kez, dönem ödemeleri ise seçilen aralığa göre tek seferde okunur.
    </p>

    <div class="grid">
      <div>
        <label>Başlangıç Dönemi</label>
        <input id="baslangicAy" type="month">
      </div>

      <div>
        <label>Bitiş Dönemi</label>
        <input id="bitisAy" type="month">
      </div>

      <div>
        <label>Personel Ara</label>
        <input id="arama" placeholder="İsim veya telefon ara">
      </div>

      <div>
        <label>Filtre</label>
        <select id="filtre">
          <option value="hepsi">Hepsi</option>
          <option value="borclu">Borcu Olanlar</option>
          <option value="fazla">Fazla Ödeyenler</option>
          <option value="tamam">Borcu Olmayanlar</option>
        </select>
      </div>

      <div>
        <button class="main" onclick="verileriYukle()">Listeyi Yükle</button>
      </div>

      <div>
        <button class="main green" onclick="csvIndir()">CSV İndir</button>
      </div>
    </div>

    <div id="msg" class="msg"></div>
  </div>

  <div class="card">
    <div id="ozet" class="summary">
      <div class="sumBox">Durum <b>Hazır</b></div>
    </div>
  </div>

  <div class="card">
    <div class="tableWrap">
      <table id="matrisTable">
        <tbody>
          <tr>
            <td class="loading">Listeyi yüklemek için butona bas.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  getDoc,
  doc,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
  authDomain:"berber-randevu-14f7f.firebaseapp.com",
  projectId:"berber-randevu-14f7f",
  storageBucket:"berber-randevu-14f7f.firebasestorage.app",
  messagingSenderId:"280530860977",
  appId:"1:280530860977:web:52c0df04c228896f211b90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const PERSONEL_COLLECTION = "personeller";
const ODEME_COLLECTION = "cay_odemeler";
const AYAR_COLLECTION = "cay_ayarlar";
const VARSAYILAN_AIDAT = 300;

let personeller = [];
let odemeMap = {};
let ayarlarMap = {};
let aylar = [];
let sonSatirlar = [];

const $ = id => document.getElementById(id);

function temizTelefon(tel){
  tel = String(tel || "").replace(/\D/g,"");
  if(tel.startsWith("90")) tel = "0" + tel.slice(2);
  if(tel && !tel.startsWith("0")) tel = "0" + tel;
  return tel.slice(0,11);
}

function getAd(p){
  return p.isim || p.adSoyad || p.ad || p.name || p.fullName || "İsimsiz Personel";
}

function getTelefonFromDoc(id,p){
  return temizTelefon(p.telefon || p.phone || p.tel || p.gsm || id || "");
}

function getAktif(p){
  if(p.aktif === false) return false;
  if(p.active === false) return false;
  if(p.durum === "pasif") return false;
  return true;
}

function getBakiye(p){
  const n = Number(p.bakiye ?? p.gecmisBakiye ?? 0);
  return Number.isFinite(n) ? n : 0;
}

function normalizeTR(v){
  return String(v || "")
    .toLocaleLowerCase("tr-TR")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/ı/g,"i")
    .replace(/ğ/g,"g")
    .replace(/ü/g,"u")
    .replace(/ş/g,"s")
    .replace(/ö/g,"o")
    .replace(/ç/g,"c")
    .replace(/[^a-z0-9 ]/gi," ")
    .replace(/\s+/g," ")
    .trim();
}

function ayAdi(key){
  const m = Number(String(key || "").split("-")[1]);
  return ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"][m-1] || key;
}

function addMonthsKey(key,delta){
  const [y,m] = String(key).split("-").map(Number);
  const d = new Date(y,m-1+delta,1);
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
}

function donemKey(date = new Date()){
  const y = date.getFullYear();
  const m = date.getMonth()+1;

  if(date.getDate() >= 15){
    return y + "-" + String(m).padStart(2,"0");
  }

  const d = new Date(y,m-2,1);
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
}

function donemLabel(key){
  const next = addMonthsKey(key,1);
  return "15 " + ayAdi(key) + " - 14 " + ayAdi(next);
}

function ayAraligiOlustur(start,end){
  const arr = [];
  let cur = start;

  while(cur <= end && arr.length < 24){
    arr.push(cur);
    cur = addMonthsKey(cur,1);
  }

  return arr;
}

function para(n){
  n = Number(n || 0);
  return n.toLocaleString("tr-TR") + " TL";
}

function bakiyeText(net){
  net = Number(net || 0);

  if(net > 0) return para(net) + " Fazla";
  if(net < 0) return para(Math.abs(net)) + " Borç";

  return "0 TL";
}

function odemeDocKey(tel,ay){
  return ay + "_" + temizTelefon(tel);
}

function durumClass(durum,net){
  if(durum === "reddedildi") return "reddedildi";
  if(net > 0) return "fazla";
  if(durum === "odendi") return "odendi";
  if(net < 0) return "bekliyor";
  return "bos";
}

function csvEscape(v){
  v = String(v ?? "");
  if(v.includes('"') || v.includes(";") || v.includes("\n")){
    return '"' + v.replaceAll('"','""') + '"';
  }
  return v;
}

function csvSatir(arr){
  return arr.map(csvEscape).join(";");
}

async function adminMi(user){
  try{
    const snap = await getDoc(doc(db,"admins",user.uid));
    if(!snap.exists()) return false;

    const d = snap.data() || {};
    return d.aktif === true && (!d.role || d.role === "admin");
  }catch(e){
    console.error(e);
    return false;
  }
}

async function personelleriYukle(){
  const snap = await getDocs(collection(db,PERSONEL_COLLECTION));

  personeller = [];

  snap.forEach(d=>{
    const p = {id:d.id,...d.data()};

    if(!getAktif(p)) return;

    const tel = getTelefonFromDoc(d.id,p);
    const ad = getAd(p);

    if(!tel || !ad) return;

    personeller.push({
      id:d.id,
      ad,
      tel,
      bakiye:getBakiye(p),
      norm:normalizeTR(ad + " " + tel)
    });
  });

  personeller.sort((a,b)=>a.ad.localeCompare(b.ad,"tr",{sensitivity:"base"}));
}

async function ayarlariYukle(){
  ayarlarMap = {};

  for(const ay of aylar){
    try{
      const snap = await getDoc(doc(db,AYAR_COLLECTION,ay));

      if(snap.exists()){
        const t = Number(snap.data().aylikTutar || 0);
        ayarlarMap[ay] = t > 0 ? t : VARSAYILAN_AIDAT;
      }else{
        ayarlarMap[ay] = VARSAYILAN_AIDAT;
      }
    }catch{
      ayarlarMap[ay] = VARSAYILAN_AIDAT;
    }
  }
}

async function odemeleriYukle(){
  odemeMap = {};

  for(const ay of aylar){
    const q = query(
      collection(db,ODEME_COLLECTION),
      where("ay","==",ay)
    );

    const snap = await getDocs(q);

    snap.forEach(d=>{
      const o = {id:d.id,...d.data()};
      const tel = temizTelefon(o.telefon || o.personelId || "");

      if(!tel) return;

      odemeMap[odemeDocKey(tel,ay)] = o;
    });
  }
}

function tabloCiz(){
  const arama = normalizeTR($("arama").value);
  const filtre = $("filtre").value;

  let toplamPersonel = 0;
  let borclu = 0;
  let fazla = 0;
  let tamam = 0;
  let toplamBeklenen = 0;
  let toplamOdenen = 0;
  let toplamGenelNet = 0;

  sonSatirlar = [];

  let thead = `
    <thead>
      <tr>
        <th>Personel</th>
        ${aylar.map(a=>`<th>${ayAdi(a)}<br><span class="small">${a}</span></th>`).join("")}
        <th>Genel Bakiye</th>
      </tr>
    </thead>
  `;

  let tbody = "<tbody>";

  for(const p of personeller){
    if(arama && !p.norm.includes(arama)) continue;

    let genelNet = Number(p.bakiye || 0);
    let toplamSatirOdenen = 0;
    let toplamSatirBeklenen = 0;

    const cells = [];

    for(const ay of aylar){
      const aidat = Number(ayarlarMap[ay] || VARSAYILAN_AIDAT);
      const odeme = odemeMap[odemeDocKey(p.tel,ay)] || null;

      let durum = odeme ? (odeme.durum || "odeme_bekliyor") : "odeme_bekliyor";
      let odenen = 0;

      if(odeme){
        const tutar = Number(odeme.tutar || 0);
        odenen = durum === "odeme_bekliyor" ? 0 : tutar;
      }

      const net = odenen - aidat;
      genelNet += net;

      toplamSatirOdenen += odenen;
      toplamSatirBeklenen += aidat;

      toplamBeklenen += aidat;
      toplamOdenen += odenen;

      let text = "";

      if(odeme){
        if(durum === "odendi"){
          text = para(odenen);
        }else if(durum === "reddedildi"){
          text = "Reddedildi";
        }else{
          text = "Bekliyor";
        }
      }else{
        text = "Kayıt yok";
      }

      cells.push({
        ay,
        aidat,
        odenen,
        net,
        durum,
        text
      });
    }

    if(filtre === "borclu" && genelNet >= 0) continue;
    if(filtre === "fazla" && genelNet <= 0) continue;
    if(filtre === "tamam" && genelNet !== 0) continue;

    toplamPersonel++;
    toplamGenelNet += genelNet;

    if(genelNet < 0) borclu++;
    else if(genelNet > 0) fazla++;
    else tamam++;

    sonSatirlar.push({
      personel:p.ad,
      telefon:p.tel,
      genelBakiye:bakiyeText(genelNet),
      toplamOdenen:toplamSatirOdenen,
      toplamBeklenen:toplamSatirBeklenen,
      cells
    });

    const genelClass = genelNet < 0 ? "genelBorc" : genelNet > 0 ? "genelFazla" : "genelTamam";

    tbody += `
      <tr>
        <td>
          ${p.ad}
          <span class="personelSub">${p.tel}</span>
        </td>

        ${cells.map(c=>`
          <td>
            <span class="cell ${durumClass(c.durum,c.net)}">
              ${c.text}
              <span class="small">${c.net < 0 ? para(Math.abs(c.net)) + " borç" : c.net > 0 ? para(c.net) + " fazla" : "tamam"}</span>
            </span>
          </td>
        `).join("")}

        <td>
          <span class="cell ${genelClass}">
            ${bakiyeText(genelNet)}
          </span>
        </td>
      </tr>
    `;
  }

  tbody += "</tbody>";

  $("matrisTable").innerHTML = thead + tbody;

  $("ozet").innerHTML = `
    <div class="sumBox">Personel <b>${toplamPersonel}</b></div>
    <div class="sumBox">Borçlu <b>${borclu}</b></div>
    <div class="sumBox">Fazla Ödeyen <b>${fazla}</b></div>
    <div class="sumBox">Borcu Olmayan <b>${tamam}</b></div>
    <div class="sumBox">Beklenen <b>${para(toplamBeklenen)}</b></div>
    <div class="sumBox">Ödenen <b>${para(toplamOdenen)}</b></div>
    <div class="sumBox">Genel Net <b>${bakiyeText(toplamGenelNet)}</b></div>
  `;
}

window.verileriYukle = async function(){
  try{
    const bas = $("baslangicAy").value;
    const bit = $("bitisAy").value;

    if(!bas || !bit){
      alert("Başlangıç ve bitiş dönemi seç.");
      return;
    }

    if(bas > bit){
      alert("Başlangıç dönemi bitişten büyük olamaz.");
      return;
    }

    aylar = ayAraligiOlustur(bas,bit);

    $("msg").textContent = "Veriler yükleniyor...";
    $("matrisTable").innerHTML = `<tbody><tr><td class="loading">Veriler yükleniyor...</td></tr></tbody>`;

    await personelleriYukle();
    await ayarlariYukle();
    await odemeleriYukle();

    tabloCiz();

    $("msg").textContent =
      personeller.length + " personel ve " + aylar.length + " dönem yüklendi.";

  }catch(err){
    console.error(err);
    $("msg").textContent = "Hata oluştu: " + err.message;
    $("matrisTable").innerHTML = `<tbody><tr><td class="loading">Veriler yüklenemedi.</td></tr></tbody>`;
  }
};

window.csvIndir = function(){
  if(!sonSatirlar.length){
    alert("Önce listeyi yükle.");
    return;
  }

  const rows = [];

  rows.push([
    "Personel",
    "Telefon",
    ...aylar.map(a=>ayAdi(a) + " " + a),
    "Toplam Beklenen",
    "Toplam Ödenen",
    "Genel Bakiye"
  ]);

  sonSatirlar.forEach(r=>{
    rows.push([
      r.personel,
      r.telefon,
      ...r.cells.map(c=>{
        const durum =
          c.durum === "odendi" ? "Ödendi" :
          c.durum === "reddedildi" ? "Reddedildi" :
          "Bekliyor";

        return durum + " / Ödenen: " + c.odenen + " / Aidat: " + c.aidat + " / Net: " + c.net;
      }),
      r.toplamBeklenen,
      r.toplamOdenen,
      r.genelBakiye
    ]);
  });

  const csv = "\uFEFF" + rows.map(csvSatir).join("\n");
  const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "cay-odeme-matris-" + $("baslangicAy").value + "-" + $("bitisAy").value + ".csv";

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
};

window.cikisYap = async function(){
  localStorage.removeItem("adminLogin");
  localStorage.removeItem("adminGiris");
  await signOut(auth);
  location.href = "adminpanel.html";
};

$("arama").addEventListener("input",()=>{
  if(aylar.length) tabloCiz();
});

$("filtre").addEventListener("change",()=>{
  if(aylar.length) tabloCiz();
});

const simdi = donemKey();
$("bitisAy").value = simdi;
$("baslangicAy").value = addMonthsKey(simdi,-3);

onAuthStateChanged(auth,async user=>{
  if(!user){
    location.replace("adminpanel.html");
    return;
  }

  const ok = await adminMi(user);

  if(!ok){
    await signOut(auth);
    location.replace("adminpanel.html");
    return;
  }
});
</script>

</body>
</html>
