<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ödeme Matris Paneli</title>

<style>
*{box-sizing:border-box}
:root{
  --bg:#f5f5f7;--text:#111;--muted:#6b7280;--line:#e5e7eb;
  --shadow:0 14px 40px rgba(0,0,0,.08);
}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif}
.topbar{position:sticky;top:0;z-index:50;background:rgba(17,17,17,.94);backdrop-filter:blur(16px);padding:13px 16px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.topbar a,.topbar button{background:#fff;color:#111;border:0;border-radius:999px;padding:10px 15px;font-weight:900;text-decoration:none;cursor:pointer}
.wrap{width:min(1500px,100%);margin:24px auto;padding:0 14px 40px}
.card{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:24px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
h1{margin:0 0 8px;font-size:34px;font-weight:1000;letter-spacing:-.7px}
p{color:var(--muted);line-height:1.45}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;align-items:end}
label{display:block;font-size:13px;font-weight:900;margin-bottom:6px}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:15px;padding:12px 13px;font:inherit;outline:none;background:#f8fafc}
button.main{width:100%;border:0;border-radius:16px;padding:13px 15px;background:#111;color:#fff;font-weight:950;cursor:pointer}
button.green{background:#15803d}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
.sumBox{background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:14px}
.sumBox b{display:block;font-size:24px;margin-top:5px}
.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:22px;background:#fff;max-height:72vh}
table{width:100%;border-collapse:separate;border-spacing:0;min-width:950px}
th,td{border-bottom:1px solid #eee;border-right:1px solid #eee;padding:10px;font-size:13px;text-align:center;vertical-align:middle;white-space:nowrap}
th{position:sticky;top:0;z-index:5;background:#111;color:white;font-weight:950}
th:first-child{left:0;z-index:7}
td:first-child{position:sticky;left:0;z-index:3;background:#fff!important;text-align:left;font-weight:950;min-width:230px;max-width:260px;white-space:normal}
.personelSub{display:block;font-size:12px;color:#444;font-weight:800;margin-top:4px}
.cell{display:block;border-radius:12px;padding:9px 10px;font-weight:950;min-width:95px;cursor:pointer;user-select:none;transition:.15s}
.cell:hover{transform:scale(1.03);box-shadow:0 8px 20px rgba(0,0,0,.12)}
.odendi{background:#dcfce7;color:#166534}.bekliyor{background:#fef3c7;color:#92400e}.reddedildi{background:#fee2e2;color:#991b1b}.fazla{background:#dbeafe;color:#1d4ed8}.bos{background:#f3f4f6;color:#6b7280}
.genelBorc{background:#fee2e2;color:#991b1b}.genelFazla{background:#dbeafe;color:#1d4ed8}.genelTamam{background:#dcfce7;color:#166534}
.small{display:block;font-size:11px;opacity:.85;margin-top:3px}
.loading{padding:30px;text-align:center;color:var(--muted);font-weight:900}
.msg{margin-top:10px;font-weight:900;color:#166534}

/* MOBİL KART GÖRÜNÜMÜ */
.mobileList{display:none}
.personCard{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 8px 24px rgba(0,0,0,.055);padding:15px;margin-bottom:12px}
.personHead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:12px}
.personName{font-size:18px;font-weight:1000;line-height:1.15}
.personTel{font-size:12px;color:#555;font-weight:800;margin-top:4px}
.personBalance{border-radius:999px;padding:8px 10px;font-size:12px;font-weight:1000;white-space:nowrap}
.monthRows{display:grid;gap:8px}
.monthRow{border:1px solid var(--line);border-radius:16px;padding:11px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;cursor:pointer}
.monthTitle{font-weight:1000}
.monthDetail{font-size:12px;color:#555;font-weight:800;margin-top:3px}
.monthStatus{border-radius:999px;padding:7px 9px;font-size:11px;font-weight:1000;text-align:center;min-width:82px}
.noMobile{display:block}

.modalBg{position:fixed;inset:0;background:rgba(0,0,0,.52);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;z-index:9999;padding:16px}
.modalBg.show{display:flex}
.modal{width:min(460px,100%);background:white;border-radius:28px;padding:22px;box-shadow:0 25px 80px rgba(0,0,0,.35)}
.modalTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
.modal h2{margin:0;font-size:24px;letter-spacing:-.4px}
.closeBtn{width:42px;height:42px;border:0;border-radius:50%;background:#111;color:#fff;font-size:22px;font-weight:950;cursor:pointer}
.modalActions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.modalActions button{border:0;border-radius:15px;padding:13px;font-weight:950;cursor:pointer;color:white}
.saveBtn{background:#15803d}.cancelBtn{background:#4b5563}.deleteBtn{background:#b91c1c;grid-column:1/-1}
.modalInfo{background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:12px;color:#374151;font-weight:800;line-height:1.45;margin-bottom:12px}

@media(max-width:760px){
  body{background:#f5f5f7}
  .wrap{margin:14px auto;padding:0 10px 28px}
  h1{font-size:26px}
  p{font-size:14px}
  .card{padding:14px;border-radius:20px;margin-bottom:12px}
  .topbar{padding:10px 8px}
  .topbar a,.topbar button{font-size:12px;padding:8px 11px}
  .grid{grid-template-columns:1fr;gap:10px}
  .summary{grid-template-columns:repeat(2,1fr);gap:8px}
  .sumBox{padding:11px;border-radius:15px;font-size:12px}
  .sumBox b{font-size:19px}
  .tableWrap{display:none}
  .mobileList{display:block}
  .noMobile{display:none}
  .modal{border-radius:22px;padding:17px}
  .modal h2{font-size:21px}
}
</style>
</head>

<body>

<div class="topbar">
  <a href="adminpanel.html">Yönetim Merkezi</a>
  <a href="odeme-admin.html">Ödeme Admin</a>
  <a href="index.html">Personel Giriş</a>
  <button onclick="cikisYap()">Çıkış</button>
</div>

<div class="wrap">

  <div class="card">
    <h1>Çay Ocağı Ödeme Matrisi</h1>
    <p>
      Masaüstünde tablo, mobilde kart görünümü kullanılır. Karttaki aya veya tablodaki hücreye basınca düzenleme penceresi açılır.

    <div class="grid">
      <div><label>Başlangıç Dönemi</label><input id="baslangicAy" type="month"></div>
      <div><label>Bitiş Dönemi</label><input id="bitisAy" type="month"></div>

        <label>Filtre</label>

      </table>

  <div class="modal">
    <div class="modalTop">
      <div>
        <h2 id="modalTitle">Ödeme Düzenle</h2>
        <p id="modalSub" style="margin:6px 0 0"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore,collection,getDocs,getDoc,doc,query,where,setDoc,serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",authDomain:"berber-randevu-14f7f.firebaseapp.com",projectId:"berber-randevu-14f7f",storageBucket:"berber-randevu-14f7f.firebasestorage.app",messagingSenderId:"280530860977",appId:"1:280530860977:web:52c0df04c228896f211b90"};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

const PERSONEL_COLLECTION="personeller";
const ODEME_COLLECTION="cay_odemeler";
const AYAR_COLLECTION="cay_ayarlar";
const VARSAYILAN_AIDAT=300;

let personeller=[];
let odemeMap={};
let ayarlarMap={};
let aylar=[];
let sonSatirlar=[];
let aktifEdit=null;

const $=id=>document.getElementById(id);

function esc(s){return String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]))}
function temizTelefon(tel){tel=String(tel||"").replace(/\D/g,"");if(tel.startsWith("90"))tel="0"+tel.slice(2);if(tel&&!tel.startsWith("0"))tel="0"+tel;return tel.slice(0,11)}
function getAd(p){return p.isim||p.adSoyad||p.ad||p.name||p.fullName||"İsimsiz Personel"}
function getTelefonFromDoc(id,p){return temizTelefon(p.telefon||p.phone||p.tel||p.gsm||id||"")}
function getAktif(p){if(p.aktif===false)return false;if(p.active===false)return false;if(p.durum==="pasif")return false;return true}
function getBakiye(p){const n=Number(p.bakiye??p.gecmisBakiye??0);return Number.isFinite(n)?n:0}
function normalizeTR(v){return String(v||"").toLocaleLowerCase("tr-TR").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/ı/g,"i").replace(/ğ/g,"g").replace(/ü/g,"u").replace(/ş/g,"s").replace(/ö/g,"o").replace(/ç/g,"c").replace(/[^a-z0-9 ]/gi," ").replace(/\s+/g," ").trim()}
function ayAdi(key){const m=Number(String(key||"").split("-")[1]);return["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"][m-1]||key}
function addMonthsKey(key,delta){const[y,m]=String(key).split("-").map(Number);const d=new Date(y,m-1+delta,1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function donemKey(date=new Date()){const y=date.getFullYear(),m=date.getMonth()+1;if(date.getDate()>=15)return y+"-"+String(m).padStart(2,"0");const d=new Date(y,m-2,1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function donemLabel(key){const next=addMonthsKey(key,1);return"15 "+ayAdi(key)+" - 14 "+ayAdi(next)}
function ayAraligiOlustur(start,end){const arr=[];let cur=start;while(cur<=end&&arr.length<24){arr.push(cur);cur=addMonthsKey(cur,1)}return arr}
function para(n){return Number(n||0).toLocaleString("tr-TR")+" TL"}
function bakiyeText(net){net=Number(net||0);if(net>0)return para(net)+" Fazla";if(net<0)return para(Math.abs(net))+" Borç";return"0 TL"}
function odemeDocKey(tel,ay){return ay+"_"+temizTelefon(tel)}
function durumClass(durum,net){if(durum==="reddedildi")return"reddedildi";if(net>0)return"fazla";if(durum==="odendi")return"odendi";if(net<0)return"bekliyor";return"bos"}
function genelClass(net){return net<0?"genelBorc":net>0?"genelFazla":"genelTamam"}
function durumText(durum){if(durum==="odendi")return"Ödendi";if(durum==="reddedildi")return"Reddedildi";return"Bekliyor"}
function csvEscape(v){v=String(v??"");if(v.includes('"')||v.includes(";")||v.includes("\n"))return'"'+v.replaceAll('"','""')+'"';return v}
function csvSatir(arr){return arr.map(csvEscape).join(";")}

async function adminMi(user){
  try{
    const snap=await getDoc(doc(db,"admins",user.uid));
    if(!snap.exists())return false;
    const d=snap.data()||{};
    return d.aktif===true&&(!d.role||d.role==="admin");
  }catch(e){console.error(e);return false}
}

async function personelleriYukle(){
  const snap=await getDocs(collection(db,PERSONEL_COLLECTION));
  personeller=[];
  snap.forEach(d=>{
    const p={id:d.id,...d.data()};
    if(!getAktif(p))return;
    const tel=getTelefonFromDoc(d.id,p);
    const ad=getAd(p);
    if(!tel||!ad)return;
    personeller.push({id:d.id,ad,tel,bakiye:getBakiye(p),norm:normalizeTR(ad+" "+tel)});
  });
  personeller.sort((a,b)=>a.ad.localeCompare(b.ad,"tr",{sensitivity:"base"}));
}

async function ayarlariYukle(){
  ayarlarMap={};
  for(const ay of aylar){
    try{
      const snap=await getDoc(doc(db,AYAR_COLLECTION,ay));
      if(snap.exists()){
        const t=Number(snap.data().aylikTutar||0);
        ayarlarMap[ay]=t>0?t:VARSAYILAN_AIDAT;
      }else{
        ayarlarMap[ay]=VARSAYILAN_AIDAT;
      }
    }catch{
      ayarlarMap[ay]=VARSAYILAN_AIDAT;
    }
  }
}

async function odemeleriYukle(){
  odemeMap={};
  for(const ay of aylar){
    const q=query(collection(db,ODEME_COLLECTION),where("ay","==",ay));
    const snap=await getDocs(q);
    snap.forEach(d=>{
      const o={id:d.id,...d.data()};
      const tel=temizTelefon(o.telefon||o.personelId||"");
      if(!tel)return;
      odemeMap[odemeDocKey(tel,ay)]=o;
    });
  }
}

function satirVerisiOlustur(p){
  let genelNet=Number(p.bakiye||0);
  let toplamSatirOdenen=0;
  let toplamSatirBeklenen=0;
  const cells=[];

  for(const ay of aylar){
    const aidat=Number(ayarlarMap[ay]||VARSAYILAN_AIDAT);
    const odeme=odemeMap[odemeDocKey(p.tel,ay)]||null;
    let durum=odeme?(odeme.durum||"odeme_bekliyor"):"odeme_bekliyor";
    let tutar=odeme&&odeme.tutar!==undefined?Number(odeme.tutar||0):aidat;
    let odenen=odeme?(durum==="odeme_bekliyor"?0:tutar):0;
    const net=odenen-aidat;

    genelNet+=net;
    toplamSatirOdenen+=odenen;
    toplamSatirBeklenen+=aidat;

    cells.push({
      ay,aidat,tutar,odenen,net,durum,
      text: odeme ? durumText(durum) : "Kayıt yok",
      not: odeme?.adminNot || ""
    });
  }

  return {genelNet,toplamSatirOdenen,toplamSatirBeklenen,cells};
}

function tabloCiz(){
  const arama=normalizeTR($("arama").value);
  const filtre=$("filtre").value;

  let toplamPersonel=0,borclu=0,fazla=0,tamam=0,toplamBeklenen=0,toplamOdenen=0,toplamGenelNet=0;
  sonSatirlar=[];

  let thead=`<thead><tr><th>Personel</th>${aylar.map(a=>`<th>${ayAdi(a)}<br><span class="small">${a}</span></th>`).join("")}<th>Genel Bakiye</th></tr></thead>`;
  let tbody="<tbody>";
  let mobileHtml="";

  for(const p of personeller){
    if(arama&&!p.norm.includes(arama))continue;

    const data=satirVerisiOlustur(p);
    const genelNet=data.genelNet;

    if(filtre==="borclu"&&genelNet>=0)continue;
    if(filtre==="fazla"&&genelNet<=0)continue;
    if(filtre==="tamam"&&genelNet!==0)continue;

    toplamPersonel++;
    toplamGenelNet+=genelNet;
    toplamBeklenen+=data.toplamSatirBeklenen;
    toplamOdenen+=data.toplamSatirOdenen;
    if(genelNet<0)borclu++;else if(genelNet>0)fazla++;else tamam++;

    sonSatirlar.push({
      personel:p.ad,
      telefon:p.tel,
      genelBakiye:bakiyeText(genelNet),
      toplamOdenen:data.toplamSatirOdenen,
      toplamBeklenen:data.toplamSatirBeklenen,
      cells:data.cells
    });

    tbody+=`
      <tr>
        <td>${esc(p.ad)}<span class="personelSub">${esc(p.tel)}</span></td>
        ${data.cells.map(c=>`
          <td>
            <span class="cell ${durumClass(c.durum,c.net)}" onclick="modalAc('${p.tel}','${esc(p.ad).replaceAll("'","\\'")}','${c.ay}')">
              ${esc(c.text)}
              <span class="small">${c.tutar?"Tutar: "+para(c.tutar):"Tutar yok"}</span>
              <span class="small">${c.net<0?para(Math.abs(c.net))+" borç":c.net>0?para(c.net)+" fazla":"tamam"}</span>
            </span>
          </td>
        `).join("")}
        <td><span class="cell ${genelClass(genelNet)}">${bakiyeText(genelNet)}</span></td>
      </tr>
    `;

    mobileHtml+=`
      <div class="personCard">
        <div class="personHead">
          <div>
            <div class="personName">${esc(p.ad)}</div>
            <div class="personTel">${esc(p.tel)}</div>
          </div>
          <div class="personBalance ${genelClass(genelNet)}">${bakiyeText(genelNet)}</div>
        </div>
        <div class="monthRows">
          ${data.cells.map(c=>`
            <div class="monthRow" onclick="modalAc('${p.tel}','${esc(p.ad).replaceAll("'","\\'")}','${c.ay}')">
              <div>
                <div class="monthTitle">${ayAdi(c.ay)} <span class="small">${c.ay}</span></div>
                <div class="monthDetail">Tutar: ${para(c.tutar)} · ${c.net<0?para(Math.abs(c.net))+" borç":c.net>0?para(c.net)+" fazla":"tamam"}</div>
              </div>
              <div class="monthStatus ${durumClass(c.durum,c.net)}">${esc(c.text)}</div>
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }

  tbody+="</tbody>";
  $("matrisTable").innerHTML=thead+tbody;
  $("mobileList").innerHTML=mobileHtml || `<div class="loading">Kayıt bulunamadı.</div>`;

  $("ozet").innerHTML=`
    <div class="sumBox">Personel <b>${toplamPersonel}</b></div>
    <div class="sumBox">Borçlu <b>${borclu}</b></div>
    <div class="sumBox">Fazla Ödeyen <b>${fazla}</b></div>
    <div class="sumBox">Borcu Olmayan <b>${tamam}</b></div>
    <div class="sumBox">Beklenen <b>${para(toplamBeklenen)}</b></div>
    <div class="sumBox">Ödenen <b>${para(toplamOdenen)}</b></div>
    <div class="sumBox">Genel Net <b>${bakiyeText(toplamGenelNet)}</b></div>
  `;
}

window.verileriYukle=async function(){
  try{
    const bas=$("baslangicAy").value;
    const bit=$("bitisAy").value;

    if(!bas||!bit){alert("Başlangıç ve bitiş dönemi seç.");return}
    if(bas>bit){alert("Başlangıç dönemi bitişten büyük olamaz.");return}

    aylar=ayAraligiOlustur(bas,bit);
    $("msg").textContent="Veriler yükleniyor...";
    $("matrisTable").innerHTML=`<tbody><tr><td class="loading">Veriler yükleniyor...</td></tr></tbody>`;
    $("mobileList").innerHTML=`<div class="loading">Veriler yükleniyor...</div>`;

    await personelleriYukle();
    await ayarlariYukle();
    await odemeleriYukle();

    tabloCiz();
    $("msg").textContent=personeller.length+" personel ve "+aylar.length+" dönem yüklendi.";
  }catch(err){
    console.error(err);
    $("msg").textContent="Hata oluştu: "+err.message;
    $("matrisTable").innerHTML=`<tbody><tr><td class="loading">Veriler yüklenemedi.</td></tr></tbody>`;
    $("mobileList").innerHTML=`<div class="loading">Veriler yüklenemedi.</div>`;
  }
};

window.modalAc=function(tel,ad,ay){
  const cleanTel=temizTelefon(tel);
  const odeme=odemeMap[odemeDocKey(cleanTel,ay)]||null;
  const aidat=Number(ayarlarMap[ay]||VARSAYILAN_AIDAT);
  const durum=odeme?(odeme.durum||"odeme_bekliyor"):"odeme_bekliyor";
  const tutar=odeme&&odeme.tutar!==undefined?Number(odeme.tutar||0):aidat;
  const not=odeme?.adminNot||"";

  aktifEdit={tel:cleanTel,ad,ay,aidat};

  $("modalTitle").textContent=ad;
  $("modalSub").textContent=ayAdi(ay)+" dönemi";
  $("modalInfo").innerHTML="<b>Dönem:</b> "+donemLabel(ay)+"<br><b>Dönem Aidatı:</b> "+para(aidat)+"<br><b>Telefon:</b> "+cleanTel;

  $("modalTutar").value=tutar;
  $("modalDurum").value=durum;
  $("modalNot").value=not;

  $("editModal").classList.add("show");
};

window.modalKapat=function(){
  $("editModal").classList.remove("show");
  aktifEdit=null;
};

window.modalKaydet=async function(){
  if(!aktifEdit)return;

  try{
    const tutar=Number($("modalTutar").value||0);
    const durum=$("modalDurum").value;
    const adminNot=$("modalNot").value||"";

    if(!Number.isFinite(tutar)||tutar<0){
      alert("Tutar 0 veya daha büyük olmalı.");
      return;
    }

    const {tel,ad,ay}=aktifEdit;

    await setDoc(doc(db,ODEME_COLLECTION,odemeDocKey(tel,ay)),{
      personelId:tel,
      telefon:tel,
      adSoyad:ad,
      ay,
      donemEtiketi:donemLabel(ay),
      tutar,
      durum,
      adminNot,
      updatedAt:serverTimestamp()
    },{merge:true});

    odemeMap[odemeDocKey(tel,ay)]={personelId:tel,telefon:tel,adSoyad:ad,ay,donemEtiketi:donemLabel(ay),tutar,durum,adminNot};

    modalKapat();
    tabloCiz();
    $("msg").textContent=ad+" / "+ayAdi(ay)+" güncellendi.";
  }catch(err){
    console.error(err);
    alert("Güncelleme hatası: "+err.message);
  }
};

window.modalBekliyorYap=async function(){
  if(!aktifEdit)return;

  $("modalDurum").value="odeme_bekliyor";
  $("modalTutar").value=Number(aktifEdit.aidat||VARSAYILAN_AIDAT);
  $("modalNot").value="Matris panelinden bekliyor yapıldı.";

  await modalKaydet();
};

window.csvIndir=function(){
  if(!sonSatirlar.length){
    alert("Önce listeyi yükle.");
    return;
  }

  const rows=[];
  rows.push(["Personel","Telefon",...aylar.map(a=>ayAdi(a)+" "+a),"Toplam Beklenen","Toplam Ödenen","Genel Bakiye"]);

  sonSatirlar.forEach(r=>{
    rows.push([
      r.personel,
      r.telefon,
      ...r.cells.map(c=>durumText(c.durum)+" / Ödenen: "+c.odenen+" / Aidat: "+c.aidat+" / Net: "+c.net),
      r.toplamBeklenen,
      r.toplamOdenen,
      r.genelBakiye
    ]);
  });

  const csv="\uFEFF"+rows.map(csvSatir).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="cay-odeme-matris-"+$("baslangicAy").value+"-"+$("bitisAy").value+".csv";

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

window.cikisYap=async function(){
  localStorage.removeItem("adminLogin");
  localStorage.removeItem("adminGiris");
  await signOut(auth);
  location.href="adminpanel.html";
};

$("arama").addEventListener("input",()=>{if(aylar.length)tabloCiz()});
$("filtre").addEventListener("change",()=>{if(aylar.length)tabloCiz()});
$("editModal").addEventListener("click",e=>{if(e.target.id==="editModal")modalKapat()});

const simdi=donemKey();
$("bitisAy").value=simdi;
$("baslangicAy").value=addMonthsKey(simdi,-3);

onAuthStateChanged(auth,async user=>{
  if(!user){
    location.replace("adminpanel.html");
    return;
  }

  const ok=await adminMi(user);

  if(!ok){
    await signOut(auth);
    location.replace("adminpanel.html");
    return;
  }
});
</script>
