<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  setDoc,
  deleteDoc,
  query,
  where,
  documentId
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
  authDomain:"berber-randevu-14f7f.firebaseapp.com",
  projectId:"berber-randevu-14f7f",
  storageBucket:"berber-randevu-14f7f.firebasestorage.app",
  messagingSenderId:"280530860977",
  appId:"1:280530860977:web:52c0df04c228896f211b90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SMS WEB APP URL - mevcut çalışan SMS altyapısı
const SMS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw32Q03nQD1FJ9iSz2LgpB2S_QEzAdSSeLK1K3IIRI39eqOXowlloGVjYRGuoezqrFLlQ/exec";

if(
  localStorage.getItem("berberGiris") !== "true" &&
  localStorage.getItem("adminGiris") !== "true" &&
  localStorage.getItem("adminLogin") !== "true"
){
  location.href = "adminpanel.html";
}

const takvimAlan = document.getElementById("takvimAlan");
const haftaYazi = document.getElementById("haftaYazi");
const durum = document.getElementById("durum");
const toast = document.getElementById("toast");

const SAATLER = ["09:00","09:50","10:30","11:20","13:20","14:00","14:50","15:30"];
const GUNLER = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];

function baslangicHaftasiBelirle(){
  const simdi = new Date();
  const gun = simdi.getDay();
  const saat = simdi.getHours();

  let hafta = pazartesiBul(simdi);

  // Cuma 18:00 sonrası + Cumartesi + Pazar otomatik sonraki hafta
  if(
    (gun === 5 && saat >= 18) ||
    gun === 6 ||
    gun === 0
  ){
    hafta.setDate(hafta.getDate() + 7);
  }

  return hafta;
}

let aktifHafta = baslangicHaftasiBelirle();
let randevular = [];
let kapaliGunler = {};
let kapaliSaatler = {};

function bildirim(metin){
  toast.innerText = metin;
  toast.classList.add("show");
  clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(()=>toast.classList.remove("show"),3000);
}

function smsTelefonDuzelt(tel){
  let t = String(tel || "").replace(/\D/g,"");
  if(t.startsWith("90") && t.length === 12) return t;
  if(t.startsWith("0") && t.length === 11) return "9" + t;
  if(t.startsWith("5") && t.length === 10) return "90" + t;
  return t;
}

function smsGonder(numbers, message){
  return new Promise((resolve, reject) => {
    if(!SMS_WEB_APP_URL || SMS_WEB_APP_URL.includes("BURAYA")){
      reject("SMS_WEB_APP_URL boş veya hatalı.");
      return;
    }

    const temizNumbers = (numbers || [])
      .map(smsTelefonDuzelt)
      .filter(n => n && n.length >= 10);

    if(!temizNumbers.length){
      reject("SMS gönderilecek geçerli telefon numarası yok.");
      return;
    }

    const callbackName = "smsCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
    const script = document.createElement("script");

    const timer = setTimeout(() => {
      try{
        delete window[callbackName];
        script.remove();
      }catch(e){}
      reject("SMS Web App zaman aşımına uğradı.");
    }, 20000);

    window[callbackName] = function(data){
      clearTimeout(timer);
      try{
        delete window[callbackName];
        script.remove();
      }catch(e){}
      console.log("ADMIN RANDEVU SMS CEVAP:", data);
      resolve(data);
    };

    const smsUrl =
      SMS_WEB_APP_URL +
      "?callback=" + encodeURIComponent(callbackName) +
      "&numbers=" + encodeURIComponent(JSON.stringify(temizNumbers)) +
      "&message=" + encodeURIComponent(message);

    script.src = smsUrl;

    script.onerror = function(){
      clearTimeout(timer);
      try{
        delete window[callbackName];
        script.remove();
      }catch(e){}
      reject("SMS Web App çağrısı başarısız.");
    };

    document.body.appendChild(script);
  });
}

function yoneticiIptalSmsMesaji(r){
  return `Sayın ${r.ad}, ${tarihFormatla(r.tarih)} ${r.saat} berber randevunuz yönetici tarafından iptal edilmiştir. En yakın tarihe tekrar randevu alınız.`;
}

function iki(n){return String(n).padStart(2,"0")}

function tarihKey(d){
  return d.getFullYear()+"-"+iki(d.getMonth()+1)+"-"+iki(d.getDate());
}

function tarihGoster(d){
  return iki(d.getDate())+"/"+iki(d.getMonth()+1)+"/"+d.getFullYear();
}

function tarihFormatla(t){
  if(!t) return "-";
  const p = String(t).split("-");
  if(p.length !== 3) return t;
  return `${p[2]}/${p[1]}/${p[0]}`;
}

function pazartesiBul(t){
  const d = new Date(t);
  d.setHours(0,0,0,0);
  const gun = d.getDay();
  const fark = gun === 0 ? -6 : 1 - gun;
  d.setDate(d.getDate()+fark);
  return d;
}

function haftaGunleri(baslangic){
  const arr = [];
  for(let i=0;i<5;i++){
    const d = new Date(baslangic);
    d.setDate(baslangic.getDate()+i);
    arr.push(d);
  }
  return arr;
}

function esc(x){
  return String(x || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function normalize(d,id){
  return {
    id,
    tarih: d.date || d.tarih || d.kayitTarih || "",
    saat: d.time || d.saat || d.zaman || d.kayitSaat || "",
    ad: d.name || d.isim || d.adSoyad || d.kayitAd || "",
    telefon: d.phone || d.telefon || d.kayitTelefon || "",
    hizmet: d.service || d.hizmet || d.kayitHizmet || "",
    durum: String(d.durum || d.status || "").toLowerCase(),
    iptalEden: d.iptalEden || ""
  };
}

function gecmisMi(tarih,saat){
  if(!tarih || !saat) return false;
  const dt = new Date(`${tarih}T${saat}:00`);
  const limit = new Date(dt);
  limit.setMinutes(limit.getMinutes()+1);
  return new Date() >= limit;
}

async function verileriAl(){
  randevular = [];
  kapaliGunler = {};
  kapaliSaatler = {};

  const gunler = haftaGunleri(aktifHafta);
  const bas = tarihKey(gunler[0]);
  const bit = tarihKey(gunler[4]);

  /*
    READ OPTİMİZASYONU:
    Eski sistem randevular, kapali_gunler ve kapali_saatler koleksiyonlarını komple okuyordu.
    Bu sürüm sadece ekranda açık olan haftanın Pazartesi-Cuma aralığını okur.
  */

  const gorulenRandevular = new Set();

  async function randevuAralikOku(alan){
    try{
      const q = query(
        collection(db,"randevular"),
        where(alan,">=",bas),
        where(alan,"<=",bit)
      );

      const snap = await getDocs(q);

      snap.forEach(x=>{
        if(gorulenRandevular.has(x.id)) return;
        gorulenRandevular.add(x.id);

        const r = normalize(x.data(),x.id);

        // İptal edilen randevular takvimde DOLU sayılmaz.
        // Böylece berber/admin tarafından silinen randevular tekrar MÜSAİT görünür.
        // Eğer "Sil ve Saati Kapat" yapıldıysa kapali_saatler kaydı olduğu için yine KAPALI görünür.
        if(r.durum === "iptal" || r.durum === "cancelled" || r.durum === "canceled") return;

        if(r.tarih >= bas && r.tarih <= bit && r.saat && r.ad && r.telefon){
          randevular.push(r);
        }
      });
    }catch(e){
      console.warn(alan + " alanına göre randevular okunamadı:", e);
    }
  }

  // Yeni kayıtlar genelde date/time, eski kayıtlar tarih/saat kullanabildiği için ikisi de desteklenir.
  await randevuAralikOku("date");
  await randevuAralikOku("tarih");

  try{
    const gq = query(
      collection(db,"kapali_gunler"),
      where(documentId(),">=",bas),
      where(documentId(),"<=",bit)
    );

    const gSnap = await getDocs(gq);
    gSnap.forEach(x=>{
      kapaliGunler[x.id] = true;
    });
  }catch(e){
    console.warn("Kapalı günler haftalık okunamadı:", e);
  }

  try{
    const sq = query(
      collection(db,"kapali_saatler"),
      where("tarih",">=",bas),
      where("tarih","<=",bit)
    );

    const sSnap = await getDocs(sq);
    sSnap.forEach(x=>{
      const d = x.data();
      if(d.tarih && d.saat){
        kapaliSaatler[d.tarih+"_"+d.saat] = x.id;
      }
    });
  }catch(e){
    console.warn("Kapalı saatler haftalık okunamadı:", e);
  }
}

function takvimCiz(){
  const gunler = haftaGunleri(aktifHafta);
  haftaYazi.innerText = tarihGoster(gunler[0]) + " - " + tarihGoster(gunler[4]);

  const rMap = {};
  randevular.forEach(r=>{
    rMap[r.tarih+"_"+r.saat] = r;
  });

  let html = "<table>";
  html += "<thead><tr>";
  html += `<th class="saat">Saat<br><span class="etiket e-kapali">TIKLA</span></th>`;

  gunler.forEach((g,i)=>{
    const t = tarihKey(g);
    const kapali = !!kapaliGunler[t];

    html += `
      <th class="gun ${kapali ? "kapali" : ""}" onclick="gunToggle('${t}')">
        <div class="gun-adi">${GUNLER[i]}</div>
        <div class="gun-tarih">${tarihGoster(g)}</div>
        <span class="etiket ${kapali ? "e-kapali" : "e-acik"}">
          ${kapali ? "KAPALI GÜN" : "AÇIK"}
        </span>
      </th>
    `;
  });

  html += "</tr></thead><tbody>";

  SAATLER.forEach(saat=>{
    html += "<tr>";

    const gunlerSaatKapali = gunler.every(g=>{
      const t = tarihKey(g);
      return kapaliGunler[t] || kapaliSaatler[t+"_"+saat];
    });

    html += `
      <td class="saat ${gunlerSaatKapali ? "kapali" : ""}" onclick="saatToggle('${saat}')">
        ${saat}<br>
        <span class="etiket ${gunlerSaatKapali ? "e-kapali" : "e-acik"}">
          ${gunlerSaatKapali ? "KAPALI" : "AÇIK"}
        </span>
      </td>
    `;

    gunler.forEach(g=>{
      const t = tarihKey(g);
      const key = t+"_"+saat;
      const r = rMap[key];

      if(kapaliGunler[t]){
        html += `
          <td class="kapali">
            KAPALI<br>
            <span class="etiket e-kapali">GÜN</span>
          </td>
        `;
      }
      else if(kapaliSaatler[key]){
        html += `
          <td class="kapali slot-click" onclick="tekSaatToggle('${t}','${saat}')">
            KAPALI<br>
            <span class="etiket e-kapali">SAAT</span>
          </td>
        `;
      }
      else if(r){
        html += `
          <td class="${gecmisMi(r.tarih,r.saat) ? "gecmis" : "dolu"} slot-click" onclick="randevuSil('${r.id}')">
            <div class="isim">${esc(r.ad)}</div>
            <div class="mini">${esc(r.telefon)}</div>
            <div class="mini">${esc(r.hizmet || "-")}</div>
            <span class="etiket ${gecmisMi(r.tarih,r.saat) ? "e-kapali" : "e-dolu"}">
              ${gecmisMi(r.tarih,r.saat) ? "GEÇMİŞ" : "DOLU"}
            </span>
          </td>
        `;
      }
      else if(gecmisMi(t,saat)){
        html += `
          <td class="gecmis">
            GEÇMİŞ<br>
            <span class="etiket e-kapali">SÜRE GEÇTİ</span>
          </td>
        `;
      }
      else{
        html += `
          <td class="musait slot-click" onclick="tekSaatToggle('${t}','${saat}')">
            MÜSAİT<br>
            <span class="etiket e-bos">BOŞ</span>
          </td>
        `;
      }
    });

    html += "</tr>";
  });

  html += "</tbody></table>";
  takvimAlan.innerHTML = html;
}

window.takvimYukle = async function(){
  try{
    durum.innerText = "Takvim yükleniyor...";
    takvimAlan.innerHTML = "Yükleniyor...";
    await verileriAl();
    takvimCiz();
    durum.innerText = "Takvim hazır. Berber de gün/saat açıp kapatabilir.";
  }catch(e){
    console.error(e);
    durum.innerText = "Takvim yüklenemedi. Firestore Rules kontrol edilmeli.";
    takvimAlan.innerHTML = "Hata oluştu.";
  }
}


window.randevuSil = async function(id){
  const r = randevular.find(x => x.id === id);
  if(!r){
    alert("Randevu bulunamadı. Takvimi yenile.");
    return;
  }

  const smsMetni = yoneticiIptalSmsMesaji(r);
  const onay = confirm(`${r.ad} adlı personelin ${tarihFormatla(r.tarih)} ${r.saat} randevusu silinsin mi?

Gönderilecek SMS:
${smsMetni}`);
  if(!onay) return;

  try{
    durum.innerText = "Randevu siliniyor ve SMS gönderiliyor...";

    await deleteDoc(doc(db,"randevular",r.id));

    try{
      await smsGonder([r.telefon], smsMetni);
      bildirim("✅ Randevu silindi ve SMS gönderildi.");
      durum.innerText = "Randevu silindi. SMS gönderildi. Saat tekrar müsait oldu.";
    }catch(smsErr){
      console.warn("Yönetici iptal SMS gönderilemedi:", smsErr);
      bildirim("⚠️ Randevu silindi ancak SMS gönderilemedi.");
      durum.innerText = "Randevu silindi fakat SMS gönderilemedi. SMS Web App kontrol edilmeli.";
      alert("Randevu silindi ancak SMS gönderilemedi: " + smsErr);
    }

    await takvimYukle();
  }catch(e){
    console.error(e);
    alert("Randevu silinirken hata oluştu: " + (e.message || e));
  }
}

window.gunToggle = async function(tarih){
  try{
    const kapaliMi = !!kapaliGunler[tarih];
    const islem = kapaliMi ? "açılsın mı" : "kapatılsın mı";

    if(!confirm(`${tarihFormatla(tarih)} günü ${islem}?`)) return;

    if(kapaliMi){
      await deleteDoc(doc(db,"kapali_gunler",tarih));
      durum.innerText = tarihFormatla(tarih) + " günü açıldı.";
      bildirim("✅ " + tarihFormatla(tarih) + " günü açıldı.");
    }else{
      await setDoc(doc(db,"kapali_gunler",tarih),{
        tarih,
        kapali:true,
        tip:"gun",
        createdAt:new Date().toISOString()
      });
      durum.innerText = tarihFormatla(tarih) + " günü kapatıldı.";
      bildirim("⛔ " + tarihFormatla(tarih) + " günü kapatıldı.");
    }

    await takvimYukle();
  }catch(e){
    console.error(e);
    alert("Gün aç/kapat işlemi başarısız.");
  }
}

window.tekSaatToggle = async function(tarih,saat){
  try{
    const key = tarih+"_"+saat;
    const id = tarih+"_"+saat.replace(":","-");
    const kapaliMi = !!kapaliSaatler[key];
    const islem = kapaliMi ? "açılsın mı" : "kapatılsın mı";

    if(!confirm(`${tarihFormatla(tarih)} günü ${saat} saati ${islem}?`)) return;

    if(kapaliMi){
      await deleteDoc(doc(db,"kapali_saatler",kapaliSaatler[key]));
      durum.innerText = tarihFormatla(tarih) + " " + saat + " açıldı.";
      bildirim("✅ " + tarihFormatla(tarih) + " " + saat + " açıldı.");
    }else{
      await setDoc(doc(db,"kapali_saatler",id),{
        tarih,
        saat,
        kapali:true,
        tip:"saat",
        createdAt:new Date().toISOString()
      });
      durum.innerText = tarihFormatla(tarih) + " " + saat + " kapatıldı.";
      bildirim("⛔ " + tarihFormatla(tarih) + " " + saat + " kapatıldı.");
    }

    await takvimYukle();
  }catch(e){
    console.error(e);
    alert("Saat aç/kapat işlemi başarısız.");
  }
}

window.saatToggle = async function(saat){
  try{
    const gunler = haftaGunleri(aktifHafta);

    const hepsiKapali = gunler.every(g=>{
      const t = tarihKey(g);
      return kapaliGunler[t] || kapaliSaatler[t+"_"+saat];
    });

    const islem = hepsiKapali ? "bu hafta açılsın mı" : "bu hafta kapatılsın mı";
    if(!confirm(`${saat} saati ${islem}?`)) return;

    if(hepsiKapali){
      for(const g of gunler){
        const t = tarihKey(g);
        const key = t+"_"+saat;

        if(kapaliSaatler[key]){
          await deleteDoc(doc(db,"kapali_saatler",kapaliSaatler[key]));
        }
      }
      durum.innerText = saat + " bu hafta açıldı.";
      bildirim("✅ " + saat + " saati bu hafta açıldı.");
    }else{
      for(const g of gunler){
        const t = tarihKey(g);

        if(kapaliGunler[t]) continue;

        const id = t+"_"+saat.replace(":","-");

        await setDoc(doc(db,"kapali_saatler",id),{
          tarih:t,
          saat,
          kapali:true,
          tip:"haftalik_saat",
          createdAt:new Date().toISOString()
        });
      }
      durum.innerText = saat + " bu hafta kapatıldı.";
      bildirim("⛔ " + saat + " saati bu hafta kapatıldı.");
    }

    await takvimYukle();
  }catch(e){
    console.error(e);
    alert("Haftalık saat aç/kapat işlemi başarısız.");
  }
}

window.oncekiHafta = function(){
  aktifHafta.setDate(aktifHafta.getDate()-7);
  takvimYukle();
}

window.buHafta = function(){
  aktifHafta = baslangicHaftasiBelirle();
  takvimYukle();
}

window.sonrakiHafta = function(){
  aktifHafta.setDate(aktifHafta.getDate()+7);
  takvimYukle();
}

window.cikis = function(){
  localStorage.clear();
  location.href = "adminpanel.html";
}

takvimYukle();
</script>
