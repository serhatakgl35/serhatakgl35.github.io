<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personel Randevu</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#fff;color:#111}
.container{max-width:500px;margin:auto;padding:20px}
.card{border:1px solid #eee;border-radius:16px;padding:16px;margin-bottom:15px}
input,button,select{width:100%;padding:12px;margin-top:8px;border-radius:10px;border:1px solid #ddd}
button{background:#111;color:#fff;font-weight:bold}
.hidden{display:none}
</style>
</head>

<body>

<div class="container">

<div id="loginBox" class="card">
<h2>Giriş Yap</h2>

<input id="girisTel" placeholder="Telefon">
<input id="girisSifre" type="password" placeholder="Şifre">
<button onclick="girisYap()">Giriş</button>

<hr>

<h3>Kayıt Ol</h3>
<input id="adSoyad" placeholder="Ad Soyad">
<input id="kayitTel" placeholder="Telefon">
<input id="kayitSifre" type="password" placeholder="Şifre">
<input id="kayitKod" placeholder="Kayıt Kodu">
<button onclick="kayitOl()">Kayıt Ol</button>
</div>

<div id="panel" class="hidden card">
<h2>Randevu Al</h2>

<div id="bilgi"></div>

<input type="date" id="tarih">
<select id="saat"></select>

<button onclick="randevuAl()">Randevu Al</button>

<h3>Randevularım</h3>
<div id="liste"></div>

<button onclick="cikis()">Çıkış</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, doc, getDoc, setDoc,
collection, addDoc, getDocs, query, where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
authDomain:"berber-randevu-14f7f.firebaseapp.com",
projectId:"berber-randevu-14f7f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const PERSONEL_KAYIT_KODU = "KANTIN10";

const SAATLER=["08:20","09:00","09:50","10:30","13:10","13:50","14:40","15:20"];

let aktifTel="",aktifAd="";

function telDuzenle(t){
t=t.replace(/\D/g,"");
if(!t.startsWith("0")) t="0"+t;
return t;
}

function tarihSinir(){
let d=new Date();
let max=new Date();
max.setDate(d.getDate()+15);
tarih.min=d.toISOString().split("T")[0];
tarih.max=max.toISOString().split("T")[0];
}

function saatYukle(){
saat.innerHTML="";
SAATLER.forEach(s=>{
let o=document.createElement("option");
o.value=s;o.textContent=s;
saat.appendChild(o);
});
}

window.girisYap=async()=>{
let tel=telDuzenle(girisTel.value);
let sifre=girisSifre.value;

let ref=doc(db,"personeller",tel);
let snap=await getDoc(ref);

if(!snap.exists()) return alert("Kayıt yok");

let data=snap.data();
if(data.sifre!==sifre) return alert("Şifre hatalı");

aktifTel=tel;
aktifAd=data.isim;

localStorage.setItem("tel",tel);
localStorage.setItem("sifre",sifre);

panelAc();
}

window.kayitOl=async()=>{
let ad=adSoyad.value;
let tel=telDuzenle(kayitTel.value);
let sifre=kayitSifre.value;
let kod=kayitKod.value;

if(kod!==PERSONEL_KAYIT_KODU) return alert("Kayıt kodu yanlış");

await setDoc(doc(db,"personeller",tel),{
isim:ad,
telefon:tel,
sifre:sifre
});

alert("Kayıt tamam");
}

function panelAc(){
loginBox.classList.add("hidden");
panel.classList.remove("hidden");

bilgi.innerHTML="👤 "+aktifAd+"<br>📞 "+aktifTel;

tarihSinir();
saatYukle();
listele();
}

window.cikis=()=>{
localStorage.clear();
location.reload();
}

window.randevuAl=async()=>{
await addDoc(collection(db,"randevular"),{
isim:aktifAd,
telefon:aktifTel,
tarih:tarih.value,
saat:saat.value
});
alert("Kaydedildi");
listele();
}

async function listele(){
let q=query(collection(db,"randevular"),where("telefon","==",aktifTel));
let snap=await getDocs(q);

liste.innerHTML="";
snap.forEach(d=>{
let r=d.data();
liste.innerHTML+=`<div>${r.tarih} ${r.saat}</div>`;
});
}

(async()=>{
let tel=localStorage.getItem("tel");
let sifre=localStorage.getItem("sifre");
if(!tel) return;

girisTel.value=tel;
girisSifre.value=sifre;
await girisYap();
})();
</script>

</body>
</html>
