<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depo Teslimat Listesi</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
  background:#f5f5f7;
  color:#111;
}
.topbar{
  background:#111;
  color:white;
  padding:22px 16px;
  text-align:center;
}
.topbar h1{
  margin:0;
  font-size:22px;
  font-weight:900;
}
.topbar p{
  margin:6px 0 0;
  color:#ccc;
  font-size:13px;
}
.wrap{
  max-width:1200px;
  margin:20px auto;
  padding:14px;
}
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:16px;
}
.stat{
  background:white;
  border-radius:24px;
  padding:18px;
  box-shadow:0 12px 30px rgba(0,0,0,.08);
}
.stat span{
  color:#666;
  font-size:13px;
  font-weight:800;
}
.stat b{
  display:block;
  font-size:30px;
  margin-top:8px;
}
.panel{
  background:white;
  border-radius:28px;
  padding:18px;
  box-shadow:0 16px 40px rgba(0,0,0,.08);
  margin-bottom:16px;
}
.filters{
  display:grid;
  grid-template-columns:1.2fr 1fr 1fr auto;
  gap:10px;
  margin-bottom:18px;
}
select,input,button{
  padding:14px;
  border-radius:16px;
  border:1px solid #ddd;
  font-size:15px;
  font-weight:700;
}
button{
  background:#111;
  color:white;
  border:0;
  cursor:pointer;
}
.table-wrap{
  overflow:auto;
}
table{
  width:100%;
  border-collapse:collapse;
  min-width:800px;
}
th{
  background:#111;
  color:white;
  padding:14px;
  text-align:left;
  font-size:13px;
}
td{
  padding:14px;
  border-bottom:1px solid #eee;
  font-weight:700;
  font-size:14px;
}
tr:hover{background:#fafafa}
.badge{
  display:inline-block;
  padding:7px 11px;
  border-radius:999px;
  background:#f1f1f3;
  font-weight:900;
}
.urun{
  background:#111;
  color:white;
}
.miktar{
  background:#e9f7ef;
  color:#137333;
}
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
.chart-row{
  margin:13px 0;
}
.chart-label{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  font-weight:900;
  margin-bottom:6px;
}
.bar-bg{
  background:#eee;
  height:14px;
  border-radius:999px;
  overflow:hidden;
}
.bar{
  background:#111;
  height:100%;
  border-radius:999px;
}
.empty{
  text-align:center;
  padding:30px;
  font-weight:900;
  color:#777;
}
@media(max-width:850px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .filters{grid-template-columns:1fr}
  .grid2{grid-template-columns:1fr}
  .topbar h1{font-size:19px}
}
</style>
</head>

<body>

<div class="topbar">
  <h1>Depo Malzeme Teslimat Raporu</h1>
  <p>Nereye, hangi üründen, ne kadar verildiğini toplu görüntüleme ekranı</p>
</div>

<div class="wrap">

  <div class="stats">
    <div class="stat"><span>Toplam Kayıt</span><b id="toplamKayit">0</b></div>
    <div class="stat"><span>Bugünkü Teslimat</span><b id="bugunKayit">0</b></div>
    <div class="stat"><span>Toplam Çay</span><b id="toplamCay">0</b></div>
    <div class="stat"><span>Toplam Şeker</span><b id="toplamSeker">0</b></div>
  </div>

  <div class="panel">
    <div class="filters">
      <select id="yerFilter" onchange="filtrele()">
        <option value="">Tüm Teslim Yerleri</option>
        <option>Karargah Çay Ocağı</option>
        <option>Yemekhane Çay Ocağı</option>
        <option>T1 Kapıaltı</option>
        <option>T2 Kapıaltı</option>
        <option>M Kapıaltı</option>
        <option>Nizamiye</option>
        <option>BDH İcap</option>
      </select>

      <select id="urunFilter" onchange="filtrele()">
        <option value="">Tüm Ürünler</option>
        <option>Çay</option>
        <option>Şeker</option>
        <option>Ahşap Karıştırıcı</option>
        <option>Türk Kahvesi</option>
      </select>

      <input id="tarihFilter" type="date" onchange="filtrele()">

      <button onclick="yukle()">Yenile</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Tarih</th>
            <th>Saat</th>
            <th>Teslim Yeri</th>
            <th>Ürün</th>
            <th>Miktar</th>
            <th>Teslim Eden</th>
            <th>Açıklama</th>
          </tr>
        </thead>
        <tbody id="liste"></tbody>
      </table>
    </div>

    <div id="empty" class="empty" style="display:none;">Kayıt bulunamadı.</div>
  </div>

  <div class="grid2">
    <div class="panel">
      <h3>Yer Bazlı Toplam Teslimat</h3>
      <div id="yerGrafik"></div>
    </div>

    <div class="panel">
      <h3>Ürün Bazlı Toplam Teslimat</h3>
      <div id="urunGrafik"></div>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "BURAYA_YAZ",
  authDomain: "BURAYA_YAZ",
  projectId: "BURAYA_YAZ",
  storageBucket: "BURAYA_YAZ",
  messagingSenderId: "BURAYA_YAZ",
  appId: "BURAYA_YAZ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let tumKayitlar = [];

function bugun(){
  return new Date().toISOString().slice(0,10);
}

function temiz(v){
  return String(v || "-")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

window.yukle = async function(){
  const snap = await getDocs(
    query(collection(db,"depo_teslimatlar"), orderBy("kayitZamani","desc"))
  );

  tumKayitlar = snap.docs.map(d => ({
    id:d.id,
    ...d.data()
  }));

  filtrele();
};

window.filtrele = function(){
  const yer = document.getElementById("yerFilter").value;
  const urun = document.getElementById("urunFilter").value;
  const tarih = document.getElementById("tarihFilter").value;

  let data = [...tumKayitlar];

  if(yer) data = data.filter(x => x.teslimYeri === yer);
  if(urun) data = data.filter(x => x.urun === urun);
  if(tarih) data = data.filter(x => x.tarih === tarih);

  ozetYaz(data);
  tabloYaz(data);
  grafikYaz(data);
};

function ozetYaz(data){
  document.getElementById("toplamKayit").textContent = data.length;
  document.getElementById("bugunKayit").textContent =
    data.filter(x => x.tarih === bugun()).length;

  document.getElementById("toplamCay").textContent =
    data.filter(x => x.urun === "Çay")
      .reduce((t,x) => t + Number(x.miktar || 0),0);

  document.getElementById("toplamSeker").textContent =
    data.filter(x => x.urun === "Şeker")
      .reduce((t,x) => t + Number(x.miktar || 0),0);
}

function tabloYaz(data){
  const tbody = document.getElementById("liste");
  const empty = document.getElementById("empty");
  tbody.innerHTML = "";

  if(data.length === 0){
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";

  data.forEach(x => {
    tbody.innerHTML += `
      <tr>
        <td>${temiz(x.tarih)}</td>
        <td>${temiz(x.saat)}</td>
        <td><span class="badge">${temiz(x.teslimYeri)}</span></td>
        <td><span class="badge urun">${temiz(x.urun)}</span></td>
        <td><span class="badge miktar">${temiz(x.miktar)} ${temiz(x.birim)}</span></td>
        <td>${temiz(x.teslimEden)}</td>
        <td>${temiz(x.aciklama)}</td>
      </tr>
    `;
  });
}

function grafikYaz(data){
  const yerMap = {};
  const urunMap = {};

  data.forEach(x => {
    const miktar = Number(x.miktar || 0);
    yerMap[x.teslimYeri || "Bilinmeyen"] =
      (yerMap[x.teslimYeri || "Bilinmeyen"] || 0) + miktar;

    urunMap[x.urun || "Bilinmeyen"] =
      (urunMap[x.urun || "Bilinmeyen"] || 0) + miktar;
  });

  grafikBas("yerGrafik", yerMap);
  grafikBas("urunGrafik", urunMap);
}

function grafikBas(id, obj){
  const el = document.getElementById(id);
  el.innerHTML = "";

  const entries = Object.entries(obj).sort((a,b) => b[1]-a[1]);
  const max = Math.max(...entries.map(x => x[1]), 1);

  if(entries.length === 0){
    el.innerHTML = `<div class="empty">Veri yok.</div>`;
    return;
  }

  entries.forEach(([ad, toplam]) => {
    const yuzde = Math.max((toplam / max) * 100, 5);

    el.innerHTML += `
      <div class="chart-row">
        <div class="chart-label">
          <span>${temiz(ad)}</span>
          <span>${toplam}</span>
        </div>
        <div class="bar-bg">
          <div class="bar" style="width:${yuzde}%"></div>
        </div>
      </div>
    `;
  });
}

yukle();
</script>

</body>
</html>
