<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Malzeme Teslimat Listesi</title>

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,0,0,.08), transparent 32%),
        linear-gradient(180deg,#f5f5f7,#ededf1);
      color:#111;
      min-height:100vh;
    }

    .topbar{
      background:rgba(17,17,17,.94);
      color:white;
      padding:22px 16px;
      position:sticky;
      top:0;
      z-index:10;
      backdrop-filter:blur(16px);
      box-shadow:0 12px 30px rgba(0,0,0,.18);
    }

    .topbar-inner{
      max-width:1150px;
      margin:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
    }

    .title h1{
      margin:0;
      font-size:22px;
      font-weight:900;
      letter-spacing:-.4px;
    }

    .title p{
      margin:5px 0 0;
      font-size:13px;
      color:#cfcfcf;
    }

    .refresh{
      border:1px solid rgba(255,255,255,.18);
      background:white;
      color:#111;
      padding:12px 16px;
      border-radius:999px;
      font-weight:900;
      cursor:pointer;
      white-space:nowrap;
    }

    .wrap{
      max-width:1150px;
      margin:22px auto;
      padding:0 14px 30px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:13px;
      margin-bottom:16px;
    }

    .stat{
      background:rgba(255,255,255,.82);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,.7);
      border-radius:24px;
      padding:18px;
      box-shadow:0 14px 34px rgba(0,0,0,.08);
    }

    .stat span{
      display:block;
      color:#666;
      font-size:13px;
      font-weight:800;
    }

    .stat b{
      display:block;
      font-size:28px;
      margin-top:7px;
      letter-spacing:-.7px;
    }

    .panel{
      background:rgba(255,255,255,.88);
      border:1px solid rgba(255,255,255,.8);
      backdrop-filter:blur(14px);
      border-radius:28px;
      padding:18px;
      box-shadow:0 18px 45px rgba(0,0,0,.09);
    }

    .filters{
      display:grid;
      grid-template-columns:1.2fr 1fr 1fr;
      gap:10px;
      margin-bottom:16px;
    }

    select,input{
      width:100%;
      padding:14px 15px;
      border-radius:17px;
      border:1px solid #ddd;
      background:#fff;
      font-size:15px;
      font-weight:700;
      outline:none;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:13px;
    }

    .item{
      background:#fff;
      border-radius:24px;
      padding:17px;
      border:1px solid #eee;
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .item-head{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      margin-bottom:13px;
    }

    .place{
      font-size:17px;
      font-weight:950;
      letter-spacing:-.2px;
    }

    .date{
      text-align:right;
      color:#666;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
      line-height:1.4;
    }

    .badges{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 11px;
      border-radius:999px;
      font-size:13px;
      font-weight:900;
      background:#f2f2f4;
    }

    .product{
      background:#111;
      color:white;
    }

    .amount{
      background:#e9f7ef;
      color:#137333;
    }

    .person{
      background:#f4f4f6;
      color:#333;
    }

    .note{
      margin-top:12px;
      background:#f7f7f8;
      border-radius:16px;
      padding:11px;
      color:#555;
      font-size:13px;
      font-weight:700;
    }

    .empty{
      text-align:center;
      padding:38px 14px;
      color:#777;
      font-weight:900;
    }

    .loading{
      text-align:center;
      padding:35px;
      font-weight:900;
      color:#666;
    }

    @media(max-width:850px){
      .topbar-inner{
        align-items:flex-start;
        flex-direction:column;
      }

      .refresh{
        width:100%;
      }

      .stats{
        grid-template-columns:repeat(2,1fr);
      }

      .filters{
        grid-template-columns:1fr;
      }

      .cards{
        grid-template-columns:1fr;
      }

      .stat b{
        font-size:24px;
      }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="title">
        <h1>Malzeme Teslimat Listesi</h1>
        <p>Çay ocakları ve görev noktalarına yapılan teslimatlar</p>
      </div>
      <button class="refresh" onclick="yukle()">Yenile</button>
    </div>
  </div>

  <div class="wrap">

    <div class="stats">
      <div class="stat">
        <span>Toplam Kayıt</span>
        <b id="toplamKayit">0</b>
      </div>
      <div class="stat">
        <span>Bugünkü Teslimat</span>
        <b id="bugunKayit">0</b>
      </div>
      <div class="stat">
        <span>Toplam Çay</span>
        <b id="toplamCay">0</b>
      </div>
      <div class="stat">
        <span>Toplam Şeker</span>
        <b id="toplamSeker">0</b>
      </div>
    </div>

    <div class="panel">
      <div class="filters">
        <select id="yerFilter" onchange="filtrele()">
          <option value="">Tüm Teslim Yerleri</option>
          <option>Karargah Çay Ocağı</option>
          <option>Yemekhane Çay Ocağı</option>
          <option>T1 Kapıaltı</option>
          <option>T2 Kapıaltı</option>
          <option>M Kapıaltı</option>
          <option>Nizamiye</option>
          <option>BDH İcap</option>
        </select>

        <select id="urunFilter" onchange="filtrele()">
          <option value="">Tüm Ürünler</option>
          <option>Çay</option>
          <option>Şeker</option>
          <option>Ahşap Karıştırıcı</option>
          <option>Türk Kahvesi</option>
        </select>

        <input id="tarihFilter" type="date" onchange="filtrele()" />
      </div>

      <div id="loading" class="loading">Veriler yükleniyor...</div>
      <div id="cards" class="cards"></div>
      <div id="empty" class="empty" style="display:none;">Kayıt bulunamadı.</div>
    </div>

  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    getDocs,
    query,
    orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "BURAYA_YAZ",
    authDomain: "BURAYA_YAZ",
    projectId: "BURAYA_YAZ",
    storageBucket: "BURAYA_YAZ",
    messagingSenderId: "BURAYA_YAZ",
    appId: "BURAYA_YAZ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let tumKayitlar = [];

  function bugun(){
    return new Date().toISOString().slice(0,10);
  }

  function guvenli(v){
    return String(v || "-")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  window.yukle = async function(){
    document.getElementById("loading").style.display = "block";
    document.getElementById("cards").innerHTML = "";
    document.getElementById("empty").style.display = "none";

    try{
      const q = query(
        collection(db, "depo_teslimatlar"),
        orderBy("kayitZamani", "desc")
      );

      const snap = await getDocs(q);

      tumKayitlar = snap.docs.map(doc => ({
        id: doc.id,
        ...doc.data()
      }));

      ozetYaz(tumKayitlar);
      filtrele();

    }catch(e){
      console.error(e);
      document.getElementById("loading").textContent =
        "Veriler yüklenirken hata oluştu.";
    }
  };

  function ozetYaz(data){
    document.getElementById("toplamKayit").textContent = data.length;
    document.getElementById("bugunKayit").textContent =
      data.filter(x => x.tarih === bugun()).length;

    const cay = data
      .filter(x => x.urun === "Çay")
      .reduce((t,x) => t + Number(x.miktar || 0), 0);

    const seker = data
      .filter(x => x.urun === "Şeker")
      .reduce((t,x) => t + Number(x.miktar || 0), 0);

    document.getElementById("toplamCay").textContent = cay;
    document.getElementById("toplamSeker").textContent = seker;
  }

  function render(data){
    const cards = document.getElementById("cards");
    const empty = document.getElementById("empty");
    const loading = document.getElementById("loading");

    loading.style.display = "none";
    cards.innerHTML = "";

    if(data.length === 0){
      empty.style.display = "block";
      return;
    }

    empty.style.display = "none";

    data.forEach(x => {
      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div class="item-head">
          <div>
            <div class="place">${guvenli(x.teslimYeri)}</div>
            <div class="badges">
              <span class="badge product">${guvenli(x.urun)}</span>
              <span class="badge amount">${guvenli(x.miktar)} ${guvenli(x.birim)}</span>
              <span class="badge person">${guvenli(x.teslimEden)}</span>
            </div>
          </div>
          <div class="date">
            ${guvenli(x.tarih)}<br>
            ${guvenli(x.saat)}
          </div>
        </div>

        ${
          x.aciklama
            ? `<div class="note">${guvenli(x.aciklama)}</div>`
            : ``
        }
      `;

      cards.appendChild(div);
    });
  }

  window.filtrele = function(){
    const yer = document.getElementById("yerFilter").value;
    const urun = document.getElementById("urunFilter").value;
    const tarih = document.getElementById("tarihFilter").value;

    let data = [...tumKayitlar];

    if(yer) data = data.filter(x => x.teslimYeri === yer);
    if(urun) data = data.filter(x => x.urun === urun);
    if(tarih) data = data.filter(x => x.tarih === tarih);

    render(data);
  };

  yukle();
</script>

</body>
</html>
