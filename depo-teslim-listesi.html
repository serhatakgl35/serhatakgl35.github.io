<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malzeme Teslimat Listesi</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
  background:linear-gradient(135deg,#f6f7fb,#eef1f6);
  color:#1d1d1f;
}
.wrap{max-width:1400px;margin:auto;padding:28px}
.header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:26px;
}
.brand{display:flex;gap:14px;align-items:center}
.logo{
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(135deg,#7c4dff,#5b8cff);
  display:flex;align-items:center;justify-content:center;
  color:white;font-size:26px;font-weight:900;
}
h1{margin:0;font-size:30px;font-weight:950}
.sub{color:#6b7280;font-weight:700;margin-top:4px}
.btn{
  border:0;background:#7157ff;color:white;
  padding:14px 20px;border-radius:15px;
  font-weight:900;cursor:pointer;
  box-shadow:0 10px 24px rgba(113,87,255,.25);
}
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  margin-bottom:22px;
}
.stat{
  background:white;border-radius:24px;padding:24px;
  box-shadow:0 15px 40px rgba(0,0,0,.07);
  display:flex;align-items:center;gap:18px;
}
.icon{
  width:62px;height:62px;border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
}
.purple{background:#efe9ff;color:#6d4aff}
.green{background:#e6f8ee;color:#14a44d}
.blue{background:#e8f3ff;color:#2f80ed}
.orange{background:#fff0d9;color:#ff9800}
.stat span{font-size:14px;color:#6b7280;font-weight:800}
.stat b{display:block;font-size:32px;margin-top:5px}
.panel{
  background:white;border-radius:26px;padding:22px;
  box-shadow:0 16px 42px rgba(0,0,0,.07);
  margin-bottom:20px;
}
.filters{
  display:grid;
  grid-template-columns:1fr 1fr 1fr auto;
  gap:14px;
}
select,input{
  width:100%;padding:16px;border-radius:18px;
  border:1px solid #e5e7eb;font-weight:800;font-size:15px;
}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
th{
  text-align:left;padding:16px;color:#6b7280;
  font-size:13px;border-bottom:1px solid #e5e7eb;
}
td{
  padding:16px;border-bottom:1px solid #eef0f3;
  font-weight:750;font-size:14px;
}
.badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 12px;border-radius:999px;
  font-weight:900;font-size:13px;
}
.place{background:#f0eaff;color:#6236d9}
.product{background:#fff2d8;color:#f59e0b}
.product.seker{background:#ffe8ef;color:#e11d48}
.product.cay{background:#e8f3ff;color:#2563eb}
.amount{background:#f1f3f5;color:#444}
.user{background:#f5f5f7;color:#333}
.bottom{
  display:grid;
  grid-template-columns:1.1fr 1.1fr .9fr;
  gap:20px;
}
canvas{max-height:260px}
.info-row{
  display:flex;justify-content:space-between;
  padding:15px 0;border-bottom:1px solid #e5e7eb;
  font-weight:850;
}
.info-row span{color:#6b7280}
.empty{text-align:center;padding:30px;font-weight:900;color:#777}
@media(max-width:950px){
  .header{flex-direction:column;align-items:flex-start;gap:14px}
  .btn{width:100%}
  .stats{grid-template-columns:repeat(2,1fr)}
  .filters{grid-template-columns:1fr}
  .bottom{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="wrap">

  <div class="header">
    <div class="brand">
      <div class="logo">▣</div>
      <div>
        <h1>Malzeme Teslimat Listesi</h1>
        <div class="sub">Depo tarafından yapılan teslimatları görüntüleyin.</div>
      </div>
    </div>
    <button class="btn" onclick="yukle()">↻ Yenile</button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="icon purple">📋</div>
      <div><span>Toplam Kayıt</span><b id="toplamKayit">0</b></div>
    </div>
    <div class="stat">
      <div class="icon green">✅</div>
      <div><span>Bugünkü Teslimat</span><b id="bugunKayit">0</b></div>
    </div>
    <div class="stat">
      <div class="icon blue">☕</div>
      <div><span>Toplam Çay</span><b id="toplamCay">0</b></div>
    </div>
    <div class="stat">
      <div class="icon orange">📦</div>
      <div><span>Toplam Şeker</span><b id="toplamSeker">0</b></div>
    </div>
  </div>

  <div class="panel">
    <div class="filters">
      <select id="yerFilter" onchange="filtrele()">
        <option value="">Tüm Teslim Yerleri</option>
        <option>Karargah Çay Ocağı</option>
        <option>Yemekhane Çay Ocağı</option>
        <option>T1 Kapıaltı</option>
        <option>T2 Kapıaltı</option>
        <option>M Kapıaltı</option>
        <option>Nizamiye</option>
        <option>BDH İcap</option>
      </select>

      <select id="urunFilter" onchange="filtrele()">
        <option value="">Tüm Ürünler</option>
        <option>Çay</option>
        <option>Şeker</option>
        <option>Ahşap Karıştırıcı</option>
        <option>Türk Kahvesi</option>
      </select>

      <input id="tarihFilter" type="date" onchange="filtrele()">
      <button class="btn" onclick="temizle()">Filtreyi Temizle</button>
    </div>
  </div>

  <div class="panel">
    <h3>Teslimat Kayıtları</h3>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Tarih</th>
            <th>Saat</th>
            <th>Teslim Yeri</th>
            <th>Ürün</th>
            <th>Miktar</th>
            <th
