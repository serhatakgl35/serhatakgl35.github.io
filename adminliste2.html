<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Berber Randevu Listesi</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      margin-bottom: 14px;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .info {
      font-size: 14px;
      color: #555;
      line-height: 1.5;
      margin-top: -6px;
      margin-bottom: 12px;
    }

    input, button, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d5d5d5;
      border-radius: 10px;
      font-size: 16px;
      margin-top: 8px;
      margin-bottom: 12px;
      background: #fff;
    }

    button {
      border: none;
      background: #111;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    button.secondary {
      background: #666;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .toolbar-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .summary-box {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 8px;
    }

    .summary-item {
      background: #fafafa;
      border: 1px solid #e7e7e7;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .summary-value {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .summary-label {
      font-size: 13px;
      color: #666;
    }

    .month-group {
      margin-top: 16px;
      border-top: 1px solid #ececec;
      padding-top: 16px;
    }

    .day-title {
      background: #f2f2f2;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .list-item {
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    .row-title {
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 16px;
    }

    .line {
      margin-bottom: 4px;
      word-break: break-word;
    }

    .empty {
      color: #666;
      font-style: italic;
    }

    .loading {
      color: #555;
    }

    .topbar-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: #efefef;
      font-size: 12px;
      margin-left: 6px;
      vertical-align: middle;
    }

    @media (max-width: 700px) {
      body {
        padding: 10px;
      }

      .card {
        padding: 14px;
      }

      .summary-box {
        grid-template-columns: 1fr;
      }

      .toolbar-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="card">
      <div class="topbar-title">
        <div>
          <h1 style="margin-bottom:8px;">💈 Berber Randevu Listesi</h1>
          <div class="info">
            Bu sayfa tüm randevuları ay bazında listeler. İsim, telefon, hizmet, tarih ve saat görünür.
          </div>
        </div>
      </div>

      <div class="toolbar">
        <label for="monthInput"><strong>Ay Seç</strong></label>
        <input type="month" id="monthInput" />

        <div class="toolbar-2">
          <button id="btnBugun">Bugünün Randevuları</button>
          <button id="btnYarin" class="secondary">Yarının Randevuları</button>
        </div>

        <button id="btnAyiGoster">Seçili Ayı Göster</button>
      </div>

      <div class="summary-box">
        <div class="summary-item">
          <div class="summary-value" id="toplamRandevu">0</div>
          <div class="summary-label">Toplam Randevu</div>
        </div>
        <div class="summary-item">
          <div class="summary-value" id="toplamGun">0</div>
          <div class="summary-label">Randevu Olan Gün</div>
        </div>
        <div class="summary-item">
          <div class="summary-value" id="seciliDonem">-</div>
          <div class="summary-label">Seçili Dönem</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 id="listeBaslik">Aylık Liste</h2>
      <div id="listeAlani" class="loading">Yükleniyor...</div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
      authDomain: "berber-randevu-14f7f.firebaseapp.com",
      projectId: "berber-randevu-14f7f",
      storageBucket: "berber-randevu-14f7f.firebasestorage.app",
      messagingSenderId: "280530860977",
      appId: "1:280530860977:web:52c0df04c228896f211b90"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const monthInput = document.getElementById("monthInput");
    const btnAyiGoster = document.getElementById("btnAyiGoster");
    const btnBugun = document.getElementById("btnBugun");
    const btnYarin = document.getElementById("btnYarin");

    const listeBaslik = document.getElementById("listeBaslik");
    const listeAlani = document.getElementById("listeAlani");

    const toplamRandevu = document.getElementById("toplamRandevu");
    const toplamGun = document.getElementById("toplamGun");
    const seciliDonem = document.getElementById("seciliDonem");

    function kacisHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatDateLocal(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + d;
    }

    function currentMonthValue() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    }

    function yarinStr() {
      const d = new Date();
      d.setDate(d.getDate() + 1);
      return formatDateLocal(d);
    }

    function ayAraligi(ayDegeri) {
      const [yil, ay] = ayDegeri.split("-").map(Number);
      const baslangic = `${yil}-${String(ay).padStart(2, "0")}-01`;
      const sonGun = new Date(yil, ay, 0).getDate();
      const bitis = `${yil}-${String(ay).padStart(2, "0")}-${String(sonGun).padStart(2, "0")}`;
      return { baslangic, bitis };
    }

    async function tumRandevulariGetir() {
      const snap = await getDocs(collection(db, "randevular"));
      const items = [];

      snap.forEach(docSnap => {
        items.push({ id: docSnap.id, ...docSnap.data() });
      });

      return items;
    }

    function sirala(items) {
      items.sort((a, b) => {
        const aKey = `${a.date || ""}_${a.time || ""}`;
        const bKey = `${b.date || ""}_${b.time || ""}`;
        return aKey.localeCompare(bKey);
      });
      return items;
    }

    function ozetGuncelle(items, donemYazi) {
      const gunSet = new Set(items.map(item => item.date).filter(Boolean));
      toplamRandevu.textContent = String(items.length);
      toplamGun.textContent = String(gunSet.size);
      seciliDonem.textContent = donemYazi;
    }

    function listeyiYaz(items, baslik, donemYazi) {
      listeBaslik.textContent = baslik;
      ozetGuncelle(items, donemYazi);

      if (!items.length) {
        listeAlani.innerHTML = '<div class="empty">Gösterilecek randevu yok.</div>';
        return;
      }

      let html = "";
      let aktifGun = "";

      items.forEach(item => {
        if (item.date !== aktifGun) {
          if (aktifGun !== "") {
            html += `</div>`;
          }
          aktifGun = item.date;

          html += `
            <div class="month-group">
              <div class="day-title">📅 ${kacisHtml(item.date)}</div>
          `;
        }

        html += `
          <div class="list-item">
            <div class="row-title">
              ⏰ ${kacisHtml(item.time || "-")}
              ${item.service ? `<span class="badge">${kacisHtml(item.service)}</span>` : ""}
            </div>
            <div class="line">👤 ${kacisHtml(item.name || "-")}</div>
            <div class="line">📞 ${kacisHtml(item.phone || "-")}</div>
            <div class="line">💇 ${kacisHtml(item.service || "-")}</div>
          </div>
        `;
      });

      if (aktifGun !== "") {
        html += `</div>`;
      }

      listeAlani.innerHTML = html;
    }

    async function seciliAyiListele() {
      const ayDegeri = monthInput.value;

      if (!ayDegeri) {
        listeAlani.innerHTML = '<div class="empty">Lütfen ay seçin.</div>';
        ozetGuncelle([], "-");
        return;
      }

      listeAlani.innerHTML = '<div class="loading">Yükleniyor...</div>';

      try {
        const { baslangic, bitis } = ayAraligi(ayDegeri);
        const tumKayitlar = await tumRandevulariGetir();

        const filtreli = tumKayitlar.filter(item => {
          return item.date && item.date >= baslangic && item.date <= bitis;
        });

        sirala(filtreli);
        listeyiYaz(filtreli, "Aylık Randevu Listesi", ayDegeri);
      } catch (error) {
        console.error(error);
        listeAlani.innerHTML = '<div class="empty">Randevular yüklenemedi.</div>';
        ozetGuncelle([], "Hata");
      }
    }

    async function bugunuListele() {
      listeAlani.innerHTML = '<div class="loading">Yükleniyor...</div>';

      try {
        const bugun = formatDateLocal(new Date());
        const tumKayitlar = await tumRandevulariGetir();

        const filtreli = tumKayitlar.filter(item => item.date === bugun);

        sirala(filtreli);
        listeyiYaz(filtreli, "Bugünün Randevuları", bugun);
      } catch (error) {
        console.error(error);
        listeAlani.innerHTML = '<div class="empty">Randevular yüklenemedi.</div>';
        ozetGuncelle([], "Hata");
      }
    }

    async function yariniListele() {
      listeAlani.innerHTML = '<div class="loading">Yükleniyor...</div>';

      try {
        const yarin = yarinStr();
        const tumKayitlar = await tumRandevulariGetir();

        const filtreli = tumKayitlar.filter(item => item.date === yarin);

        sirala(filtreli);
        listeyiYaz(filtreli, "Yarının Randevuları", yarin);
      } catch (error) {
        console.error(error);
        listeAlani.innerHTML = '<div class="empty">Randevular yüklenemedi.</div>';
        ozetGuncelle([], "Hata");
      }
    }

    btnAyiGoster.addEventListener("click", seciliAyiListele);
    btnBugun.addEventListener("click", bugunuListele);
    btnYarin.addEventListener("click", yariniListele);

    monthInput.addEventListener("change", seciliAyiListele);

    async function baslat() {
      monthInput.value = currentMonthValue();
      await seciliAyiListele();
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "admin.html";
        return;
      }

      try {
        const adminRef = doc(db, "admins", user.uid);
        const adminSnap = await getDoc(adminRef);

        if (!adminSnap.exists() || adminSnap.data().aktif !== true) {
          await signOut(auth);
          window.location.href = "admin.html";
          return;
        }

        await baslat();
      } catch (error) {
        console.error("Admin kontrol hatası:", error);
        await signOut(auth);
        window.location.href = "admin.html";
      }
    });
  </script>
</body>
</html>
