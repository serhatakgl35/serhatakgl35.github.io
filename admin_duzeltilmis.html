<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kantin10 Admin Paneli</title>

  <style>
    * { box-sizing: border-box; }

    html {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      background: #f5f5f7;
      color: #111;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Arial, sans-serif;
    }

    .topbar {
      width: 100%;
      background: #111;
      color: white;
      padding: 14px 16px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .topbar a, .topbar button {
      color: white;
      text-decoration: none;
      background: #222;
      border: 1px solid #333;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px;
    }

    .card {
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.08);
      backdrop-filter: blur(14px);
    }

    h1, h2 {
      margin: 0 0 14px;
    }

    input, select, button {
      width: 100%;
      padding: 13px;
      border-radius: 14px;
      border: 1px solid #ddd;
      font-size: 15px;
      margin: 6px 0;
    }

    button {
      background: #111;
      color: white;
      font-weight: 800;
      cursor: pointer;
      border: none;
    }

    button.danger {
      background: #d70015;
    }

    button.gray {
      background: #555;
    }

    button.green {
      background: #087f23;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .hidden {
      display: none !important;
    }

    .status {
      padding: 12px;
      border-radius: 14px;
      background: #eee;
      font-weight: 700;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #111;
      color: white;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eee;
      font-weight: 800;
      font-size: 12px;
    }

    .closed-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .item {
      background: #fff;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .item button {
      width: auto;
      padding: 9px 12px;
      margin: 0;
    }

    @media (max-width: 700px) {
      .wrap { padding: 12px; }
      .grid, .closed-list { grid-template-columns: 1fr; }
      h1 { font-size: 24px; }
      .topbar {
        justify-content: flex-start;
        overflow-x: auto;
        flex-wrap: nowrap;
        padding: 12px;
        -webkit-overflow-scrolling: touch;
      }
      .topbar a, .topbar button {
        white-space: nowrap;
        flex: 0 0 auto;
        padding: 12px 16px;
      }
      table { min-width: 640px; }
      th, td { padding: 10px; font-size: 13px; }
    }
  </style>
</head>

<body>

  <nav class="topbar hidden" id="topbar">
    <a href="randevual.html">Randevu Al</a>
    <a href="haftaliktakvim.html">Haftalık Randevu</a>
    <a href="liste.html">Takvimli Liste</a>
    <button id="logoutBtn" class="hidden">Çıkış Yap</button>
  </nav>

  <div class="wrap">

    <div id="loginCard" class="card">
      <h1>Admin Girişi</h1>
      <input id="email" type="email" placeholder="Admin e-posta" />
      <input id="password" type="password" placeholder="Şifre" />
      <button id="loginBtn">Giriş Yap</button>
      <div id="loginStatus" class="status hidden"></div>
    </div>

    <div id="adminPanel" class="hidden">

      <div class="card">
        <h1>Kantin10 Admin Paneli</h1>
        <div id="adminInfo" class="status"></div>
      </div>

      <div class="card">
        <h2>Randevular</h2>
        <button id="refreshBtn">Randevuları Yenile</button>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Tarih</th>
                <th>Saat</th>
                <th>İsim</th>
                <th>Telefon</th>
                <th>Hizmet</th>
                <th>Silme Kodu</th>
                <th>İşlem</th>
              </tr>
            </thead>
            <tbody id="appointmentsBody">
              <tr><td colspan="7">Yükleniyor...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2>Gün Kapat</h2>
        <div class="grid">
          <input id="closedDayDate" type="date" />
          <button id="closeDayBtn">Bu Günü Kapat</button>
        </div>
      </div>

      <div class="card">
        <h2>Saat Kapat</h2>
        <div class="grid">
          <input id="closedHourDate" type="date" />
          <select id="closedHourTime">
            <option value="">Saat seç</option>
          </select>
        </div>
        <button id="closeHourBtn">Bu Saati Kapat</button>
      </div>

      <div class="card">
        <h2>Kapalı Günler</h2>
        <div id="closedDaysList" class="closed-list"></div>
      </div>

      <div class="card">
        <h2>Kapalı Saatler</h2>
        <div id="closedHoursList" class="closed-list"></div>
      </div>

      <div id="mainStatus" class="status hidden"></div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      getFirestore,
      collection,
      doc,
      getDoc,
      getDocs,
      setDoc,
      deleteDoc,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
      authDomain: "berber-randevu-14f7f.firebaseapp.com",
      projectId: "berber-randevu-14f7f",
      storageBucket: "berber-randevu-14f7f.appspot.com",
      messagingSenderId: "BURAYA_MESSAGING_SENDER_ID",
      appId: "1:280530860977:web:52c0df04c228896f211b90"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const SAATLER = [
      "08:20", "09:00", "09:50", "10:30", "11:20",
      "13:20", "14:00", "14:50", "15:30", "16:20"
    ];

    const topbar = document.getElementById("topbar");
    const loginCard = document.getElementById("loginCard");
    const adminPanel = document.getElementById("adminPanel");
    const loginStatus = document.getElementById("loginStatus");
    const mainStatus = document.getElementById("mainStatus");
    const adminInfo = document.getElementById("adminInfo");
    const logoutBtn = document.getElementById("logoutBtn");

    const appointmentsBody = document.getElementById("appointmentsBody");
    const closedHourTime = document.getElementById("closedHourTime");
    const closedDaysList = document.getElementById("closedDaysList");
    const closedHoursList = document.getElementById("closedHoursList");

    SAATLER.forEach(saat => {
      const opt = document.createElement("option");
      opt.value = saat;
      opt.textContent = saat;
      closedHourTime.appendChild(opt);
    });

    function showStatus(msg, error = false) {
      mainStatus.classList.remove("hidden");
      mainStatus.style.background = error ? "#ffe5e5" : "#e8f5e9";
      mainStatus.textContent = msg;
      setTimeout(() => mainStatus.classList.add("hidden"), 3500);
    }

    function showLoginStatus(msg) {
      loginStatus.classList.remove("hidden");
      loginStatus.style.background = "#ffe5e5";
      loginStatus.textContent = msg;
    }

    function getField(data, names, fallback = "") {
      for (const name of names) {
        if (data && data[name] !== undefined && data[name] !== null) return data[name];
      }
      return fallback;
    }

    function normalizeDate(val) {
      if (!val) return "";
      if (typeof val === "string") {
        if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
        if (/^\d{2}\/\d{2}\/\d{4}$/.test(val)) {
          const [d, m, y] = val.split("/");
          return `${y}-${m}-${d}`;
        }
      }
      return String(val);
    }

    function normalizeTime(val) {
      if (!val) return "";
      return String(val).slice(0, 5);
    }

    async function isAdmin(uid) {
      const ref = doc(db, "admins", uid);
      const snap = await getDoc(ref);

      if (!snap.exists()) return false;

      const data = snap.data();
      return data.aktif === true && data.role === "admin";
    }

    async function loadAppointments() {
      appointmentsBody.innerHTML = `<tr><td colspan="7">Yükleniyor...</td></tr>`;

      try {
        const snap = await getDocs(collection(db, "randevular"));
        const list = [];

        snap.forEach(d => {
          const data = d.data();

          const tarih = normalizeDate(getField(data, ["tarih", "date", "randevuTarihi", "randevu_tarihi"]));
          const saat = normalizeTime(getField(data, ["saat", "zaman", "time", "randevuSaati", "randevu_saati"]));

          // Boş/eksik sistem kayıtlarını gizle.
          // Örnek: sadece telegramHatirlatma10Gonderildi alanı olan kayıtlar tabloda görünmez.
          if (!tarih || !saat) return;

          const isim = getField(data, ["isim", "name", "ad", "adSoyad", "ad_soyad", "musteriAdi", "musteri_adi"], "-");
          const telefon = getField(data, ["telefon", "phone", "tel", "gsm", "numara"], "-");
          const hizmet = getField(data, ["hizmet", "service", "islem", "işlem"], "-");
          const silmeKodu = getField(data, ["silmeKodu", "silme_kodu", "deleteCode", "iptalKodu", "iptal_kodu", "kod"], "-");

          list.push({
            id: d.id,
            tarih,
            saat,
            isim,
            telefon,
            hizmet,
            silmeKodu
          });
        });

        list.sort((a, b) => `${a.tarih} ${a.saat}`.localeCompare(`${b.tarih} ${b.saat}`));

        if (list.length === 0) {
          appointmentsBody.innerHTML = `<tr><td colspan="7">Aktif randevu yok veya eksik/boş kayıtlar gizlendi.</td></tr>`;
          return;
        }

        appointmentsBody.innerHTML = "";

        list.forEach(r => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td><span class="pill">${r.tarih}</span></td>
            <td><strong>${r.saat}</strong></td>
            <td>${escapeHtml(r.isim)}</td>
            <td>${escapeHtml(r.telefon)}</td>
            <td>${escapeHtml(r.hizmet)}</td>
            <td><strong>${escapeHtml(r.silmeKodu)}</strong></td>
            <td><button class="danger" data-id="${r.id}">Sil</button></td>
          `;

          tr.querySelector("button").addEventListener("click", async () => {
            if (!confirm(`${r.tarih} ${r.saat} randevusu silinsin mi?`)) return;
            try {
              await deleteDoc(doc(db, "randevular", r.id));
              showStatus("Randevu silindi.");
              loadAppointments();
            } catch (err) {
              showStatus("Silme hatası: " + err.message, true);
            }
          });

          appointmentsBody.appendChild(tr);
        });

      } catch (err) {
        appointmentsBody.innerHTML = `<tr><td colspan="7">Hata: ${escapeHtml(err.message)}</td></tr>`;
      }
    }

    async function loadClosedDays() {
      closedDaysList.innerHTML = "Yükleniyor...";

      try {
        const snap = await getDocs(collection(db, "kapali_gunler"));
        closedDaysList.innerHTML = "";

        if (snap.empty) {
          closedDaysList.innerHTML = "<div>Kapalı gün yok.</div>";
          return;
        }

        snap.forEach(d => {
          const item = document.createElement("div");
          item.className = "item";
          item.innerHTML = `
            <strong>${escapeHtml(d.id)}</strong>
            <button class="danger">Aç</button>
          `;

          item.querySelector("button").addEventListener("click", async () => {
            await deleteDoc(doc(db, "kapali_gunler", d.id));
            showStatus("Kapalı gün açıldı.");
            loadClosedDays();
          });

          closedDaysList.appendChild(item);
        });

      } catch (err) {
        closedDaysList.innerHTML = "Hata: " + escapeHtml(err.message);
      }
    }

    async function loadClosedHours() {
      closedHoursList.innerHTML = "Yükleniyor...";

      try {
        const snap = await getDocs(collection(db, "kapali_saatler"));
        closedHoursList.innerHTML = "";

        if (snap.empty) {
          closedHoursList.innerHTML = "<div>Kapalı saat yok.</div>";
          return;
        }

        snap.forEach(d => {
          const data = d.data();
          const tarih = normalizeDate(getField(data, ["tarih", "date"], "-"));
          const saat = normalizeTime(getField(data, ["saat", "time"], "-"));

          const item = document.createElement("div");
          item.className = "item";
          item.innerHTML = `
            <strong>${escapeHtml(tarih)} - ${escapeHtml(saat)}</strong>
            <button class="danger">Aç</button>
          `;

          item.querySelector("button").addEventListener("click", async () => {
            await deleteDoc(doc(db, "kapali_saatler", d.id));
            showStatus("Kapalı saat açıldı.");
            loadClosedHours();
          });

          closedHoursList.appendChild(item);
        });

      } catch (err) {
        closedHoursList.innerHTML = "Hata: " + escapeHtml(err.message);
      }
    }

    async function closeDay() {
      const tarih = document.getElementById("closedDayDate").value;
      if (!tarih) return showStatus("Önce tarih seç.", true);

      await setDoc(doc(db, "kapali_gunler", tarih), {
        tarih,
        createdAt: new Date().toISOString()
      });

      showStatus("Gün kapatıldı.");
      loadClosedDays();
    }

    async function closeHour() {
      const tarih = document.getElementById("closedHourDate").value;
      const saat = document.getElementById("closedHourTime").value;

      if (!tarih || !saat) return showStatus("Tarih ve saat seç.", true);

      const id = `${tarih}_${saat.replace(":", "-")}`;

      await setDoc(doc(db, "kapali_saatler", id), {
        tarih,
        saat,
        createdAt: new Date().toISOString()
      });

      showStatus("Saat kapatıldı.");
      loadClosedHours();
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        showLoginStatus("Giriş başarısız: " + err.message);
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
    });

    document.getElementById("refreshBtn").addEventListener("click", loadAppointments);
    document.getElementById("closeDayBtn").addEventListener("click", closeDay);
    document.getElementById("closeHourBtn").addEventListener("click", closeHour);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        topbar.classList.add("hidden");
        loginCard.classList.remove("hidden");
        adminPanel.classList.add("hidden");
        logoutBtn.classList.add("hidden");
        return;
      }

      const ok = await isAdmin(user.uid);

      if (!ok) {
        topbar.classList.add("hidden");
        await signOut(auth);
        showLoginStatus("Bu kullanıcı admin değil. Firestore admins koleksiyonuna UID eklenmemiş.");
        return;
      }

      loginCard.classList.add("hidden");
      adminPanel.classList.remove("hidden");
      topbar.classList.remove("hidden");
      logoutBtn.classList.remove("hidden");

      adminInfo.textContent = `Giriş yapıldı: ${user.email}`;

      await loadAppointments();
      await loadClosedDays();
      await loadClosedHours();
    });
  </script>

</body>
</html>
